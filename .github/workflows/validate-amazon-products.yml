name: Validate Amazon Products

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Validate Amazon product links and images
        id: validate
        continue-on-error: true
        run: node scripts/validate-amazon-products.mjs

      - name: Create GitHub issue if products are broken
        if: steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Re-run to capture output
          OUTPUT=$(node scripts/validate-amazon-products.mjs 2>&1 || true)

          BODY=$(cat <<'ISSUE_BODY'
          ## ⚠️ Prodotti Amazon non validi

          La verifica settimanale ha trovato prodotti Amazon con link o immagini non funzionanti.

          ### Dettagli
          ```
          PLACEHOLDER_OUTPUT
          ```

          ### Azioni richieste
          1. Verificare manualmente i prodotti segnalati su amazon.it
          2. Se il prodotto non esiste più, sostituire l'ASIN in:
             - `services/creatorProductsService.ts` (CREATOR_PRODUCTS array)
             - `scripts/fetch-amazon-products.mjs` (PRODUCTS array)
          3. Rigenerare: `node scripts/fetch-amazon-products.mjs`
          4. Eseguire test: `npx vitest run tests/creator-products.test.ts`

          _Generato automaticamente da validate-amazon-products.yml_
          ISSUE_BODY
          )

          BODY="${BODY//PLACEHOLDER_OUTPUT/$OUTPUT}"

          gh label create "amazon-products" --color "FF9900" --description "Amazon affiliate product issues" --force 2>/dev/null || true
          gh label create "automated" --color "BFDADC" --description "Automatically created" --force 2>/dev/null || true

          # Check if an open issue already exists to avoid duplicates
          EXISTING=$(gh issue list --label "amazon-products" --state open --limit 1 --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "ℹ️ Open issue #$EXISTING already exists — adding comment"
            gh issue comment "$EXISTING" --body "### Aggiornamento $(date -u +%Y-%m-%d)

          $OUTPUT"
          else
            gh issue create \
              --title "⚠️ Prodotti Amazon non validi — $(date -u +%Y-%m-%d)" \
              --body "$BODY" \
              --label "amazon-products,automated"
            echo "✅ Issue created"
          fi
