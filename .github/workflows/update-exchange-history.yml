name: Update Exchange Rate History

on:
  schedule:
    - cron: '30 5 * * *'  # Daily at 05:30 UTC (07:30 CET) — after ECB publishes rates
  workflow_dispatch:

concurrency:
  group: exchange-history
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          else
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON secret not set"
            exit 1
          fi

      - name: Update exchange rate history
        run: node scripts/update-exchange-history.mjs
