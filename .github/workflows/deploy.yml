name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      article_id:
        description: 'Optional article id to verify live metadata and post to Facebook after deploy'
        required: false
        type: string
      article_url:
        description: 'Optional live article URL for post-deploy metadata verification'
        required: false
        type: string
      og_title:
        description: 'Optional expected OG title for the deployed article'
        required: false
        type: string
      og_description:
        description: 'Optional OG description for the Facebook post copy'
        required: false
        type: string
      og_image:
        description: 'Optional expected OG image for the deployed article'
        required: false
        type: string
      article_category:
        description: 'Optional article category used for Facebook hashtags'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-github-pages-live
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          else
            echo "⚠️ Firebase secrets not set — Remote Config secrets will not be loaded."
          fi
          if [ -f /tmp/firebase-sa.json ]; then
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      - name: Load secrets from Remote Config
        run: node scripts/load-rc-env.mjs

      - name: Assemble jobs dataset from per-crawler slices
        run: node scripts/assemble-jobs-dataset.mjs --stats

      - name: Housekeeping (cross-crawler dedup + locale hardening)
        env:
          JOBS_SKIP_URL_VALIDATION: '1'
        run: node scripts/cleanup-jobs.mjs

      - name: Validate translation completeness (blocking)
        run: node scripts/validate-translation-completeness.mjs

      - name: Validate crawler summary store (blocking)
        run: npm run validate:crawler-summaries

      - name: Validate third-party secrets are not committed (blocking)
        run: npm run validate:third-party-secrets

      - name: Fetch Amazon product data
        continue-on-error: true
        run: node scripts/fetch-amazon-products.mjs

      - name: Cache responsive image thumbnails
        id: thumb-cache
        uses: actions/cache@v4
        with:
          path: |
            public/images/blog/thumbnails
            public/images/places/thumbnails
          key: thumbnails-v1-${{ hashFiles('public/images/blog/*.*', 'public/images/places/*.*') }}

      - name: Generate responsive image thumbnails
        if: steps.thumb-cache.outputs.cache-hit != 'true'
        run: node scripts/generate-image-thumbnails.mjs

      - name: Build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npm run build:prod

      - name: SPA fallback (GitHub Pages serves 404.html for unknown paths)
        run: cp dist/index.html dist/404.html

      - name: Replace flat redirect files with content copies
        run: node scripts/flat-content-replace.mjs

      - name: Validate sampled JobPosting rich results (blocking)
        run: npm run validate:jobs-rich-results

      - name: Validate job data quality (blocking)
        run: npm run validate:jobs-quality

      - name: Validate sitemap links exist in dist (blocking)
        run: npm run validate:sitemap-links

      - name: Validate soft-404 indicators in static pages (blocking)
        run: node scripts/validate-soft404.mjs

      - name: Validate sitemap canonical tags (blocking)
        run: node scripts/validate-canonical.mjs

      - name: Validate sitemap content quality (blocking)
        run: node scripts/validate-content-quality.mjs

      - name: Validate structured data completeness (blocking)
        run: node scripts/validate-structured-data-completeness.mjs

      - name: Install Playwright browsers for SPA render validation
        run: npx playwright install --with-deps chromium

      - name: Validate SPA render — canonical, schema, robots (blocking)
        timeout-minutes: 5
        run: node scripts/validate-spa-render.mjs

      - name: Build size summary
        run: |
          echo "=== Build size summary ==="
          du -sh dist/
          echo "JS files:"
          find dist -name "*.js" ! -name "*.gz" -exec du -sh {} + | sort -rh | head -10
          echo "CSS files:"
          find dist -name "*.css" ! -name "*.gz" -exec du -sh {} + | sort -rh

      - name: Capture pre-deploy sitemap URLs (for IndexNow diff)
        continue-on-error: true
        run: node scripts/capture-deployed-sitemaps.mjs

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Wait for live article metadata
        if: success() && github.event_name == 'workflow_dispatch' && github.event.inputs.article_url != '' && github.event.inputs.og_title != ''
        id: wait_live_meta
        # Pass dispatch inputs via env vars to avoid shell injection / escape issues
        # when article titles contain smart quotes, apostrophes, backticks, or $.
        env:
          ARTICLE_URL: ${{ github.event.inputs.article_url }}
          OG_TITLE: ${{ github.event.inputs.og_title }}
          OG_IMAGE: ${{ github.event.inputs.og_image }}
        run: |
          node scripts/wait-for-live-article-meta.mjs \
            "$ARTICLE_URL" \
            "$OG_TITLE" \
            "$OG_IMAGE"

      - name: Post to Facebook Page
        if: success() && github.event_name == 'workflow_dispatch' && github.event.inputs.article_id != '' && steps.wait_live_meta.outcome == 'success'
        continue-on-error: true
        env:
          ARTICLE_ID: ${{ github.event.inputs.article_id }}
          ARTICLE_URL: ${{ github.event.inputs.article_url }}
          OG_TITLE: ${{ github.event.inputs.og_title }}
          OG_DESCRIPTION: ${{ github.event.inputs.og_description }}
          ARTICLE_CATEGORY: ${{ github.event.inputs.article_category }}
        run: |
          node scripts/post-to-facebook.mjs \
            "$ARTICLE_ID" \
            "$ARTICLE_URL" \
            "$OG_TITLE" \
            "$OG_DESCRIPTION" \
            "$ARTICLE_CATEGORY"

      - name: Post to LinkedIn Company Page
        if: success() && github.event_name == 'workflow_dispatch' && github.event.inputs.article_id != '' && steps.wait_live_meta.outcome == 'success'
        continue-on-error: true
        env:
          ARTICLE_ID: ${{ github.event.inputs.article_id }}
          ARTICLE_URL: ${{ github.event.inputs.article_url }}
          OG_TITLE: ${{ github.event.inputs.og_title }}
          OG_DESCRIPTION: ${{ github.event.inputs.og_description }}
          ARTICLE_CATEGORY: ${{ github.event.inputs.article_category }}
        run: |
          node scripts/post-to-linkedin.mjs \
            "$ARTICLE_ID" \
            "$ARTICLE_URL" \
            "$OG_TITLE" \
            "$OG_DESCRIPTION" \
            "$ARTICLE_CATEGORY"

      - name: Google Indexing API — JobPosting only
        if: success()
        continue-on-error: true
        run: node scripts/submit-google-indexing-jobs.js

      - name: Submit to IndexNow (Bing, Yandex)
        if: success()
        continue-on-error: true
        # Forward ARTICLE_URL when the deploy was triggered by article-generation,
        # so the Bing URL Submission API receives only the new article (4 hreflang
        # alternates) instead of re-submitting already-indexed news items every
        # deploy. Routine deploys leave ARTICLE_URL empty and skip the Bing URL
        # Submission channel entirely — IndexNow fan-out (quota-free) still runs.
        # See docs/bing-quota-investigation.md.
        env:
          ARTICLE_URL: ${{ github.event.inputs.article_url }}
        run: node scripts/submit-indexnow.js

      - name: Google Search Console — sitemap ping & inspection
        if: success()
        continue-on-error: true
        timeout-minutes: 5
        run: node scripts/submit-google-indexing.js

      - name: Post-deploy SEO verification (Layer 2)
        if: success()
        continue-on-error: true
        timeout-minutes: 5
        run: node scripts/verify-post-deploy-seo.mjs

      - name: Report failure to Linear
        if: failure()
        continue-on-error: true
        run: |
          node scripts/lib/linear-issue-creator.mjs \
            --title "CI Failure: ${{ github.workflow }} — run ${{ github.run_number }}" \
            --description "## Deploy fallito
          **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** ${{ github.ref_name }}
          **Trigger:** ${{ github.event_name }}" \
            --priority 1 \
            --label Bug \
            --workflow "${{ github.workflow }}"
