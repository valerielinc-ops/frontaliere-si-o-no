name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/border-wait-current.json'
      - 'data/border-wait-history/**'
      - 'data/weather-snapshot.json'
  workflow_dispatch:
    inputs:
      article_id:
        description: 'Optional article id to verify live metadata and post to Facebook after deploy'
        required: false
        type: string
      article_url:
        description: 'Optional live article URL for post-deploy metadata verification'
        required: false
        type: string
      og_title:
        description: 'Optional expected OG title for the deployed article'
        required: false
        type: string
      og_description:
        description: 'Optional OG description for the Facebook post copy'
        required: false
        type: string
      og_image:
        description: 'Optional expected OG image for the deployed article'
        required: false
        type: string
      article_category:
        description: 'Optional article category used for Facebook hashtags'
        required: false
        type: string
      profile_sequential:
        description: 'Investigation-only run: same sequential build as production (now the default), but skips deploy/validate/upload steps. Use to inspect [profile-detail] timings without consuming a deploy slot.'
        required: false
        type: boolean
        default: false
      profile_jobs_seo:
        description: 'Enable jobsSeoPagesPlugin per-category profiler (counts + total/avg/p50/p99 timings per emission category). Pair with profile_sequential for clean numbers.'
        required: false
        type: boolean
        default: false
      profile_weekly_employers:
        description: 'Enable weeklyEmployersPlugin per-category profiler (counts + total/avg/p50/p99 timings per phase: cleanup, load-jobs, render-current-week, render-company-city-page, flush, etc.). Pair with profile_sequential for clean numbers.'
        required: false
        type: boolean
        default: false
      write_collision_dump:
        description: 'Investigation-only: dump every unique-by-hash content claim() to dist/.write-collisions-data/ for triaging colliding paths. Off by default — adds ~200k synchronous writeFileSync calls during build (~100-200s overhead) that get pruned at end. The collisions JSON report is emitted regardless; only enable this when you need the actual HTML payload of a colliding path.'
        required: false
        type: boolean
        default: false
      parallel_plugins:
        description: 'Force parallel closeBundle even when profile_sequential=true. Default (off) means parallel for production, sequential only for clean profile dispatch runs. Set this to true when you want to dispatch a profile run AND keep the parallel scheduling — useful for measuring parallel build behavior without cron-storm cancellation.'
        required: false
        type: boolean
        default: false

permissions:
  # This workflow only needs repository read access: the previous-slug winners
  # sync moved to post-deploy-validation.yml, while the deploy itself only
  # uploads artifacts and publishes to GitHub Pages.
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    # `pages-build` concurrency group with cancel-in-progress: FALSE.
    # Builds are 12-15 min of heavy CPU each. We need:
    #   1. NOT to run 5+ builds in parallel for stale cron commits
    #      (each will be obsoleted by the next cron)
    #   2. NOT to cancel a build in-flight at the 14-minute mark just
    #      because a new cron landed (wasting all that CPU). Run
    #      25428278837 was killed this way: build started 09:51:34,
    #      cron 827241b2 landed at 10:08:30 (8 SECONDS before the
    #      build would have completed), cancel-in-progress: true
    #      killed it at 10:08:38.
    #
    # cancel-in-progress: false gives both:
    #   - in-flight build finishes normally (no wasted CPU)
    #   - new cron arrivals enter the queue as pending; if a third
    #     pending lands, GitHub's 1+1 cap drops the MIDDLE one. This
    #     is fine: every cron commit is cumulative (it includes all
    #     prior cron commits in main), so the LAST entry in the queue
    #     is always a superset of the dropped middles.
    #
    # Why a SEPARATE group from `deploy`'s `pages-deploy`:
    #   With both jobs sharing one group, every cron commit landing
    #   while a deploy was queued cancelled the previously-queued
    #   deploy of a still-valid earlier run (run 25425625029.deploy
    #   was killed this way). Splitting:
    #     - `pages-build`  serializes builds  (1+1, last-wins on overflow)
    #     - `pages-deploy` serializes deploys (1+1, last-wins on overflow)
    #   keeps each group lightly populated.
    #
    # Profile-only runs (profile_sequential=true) use a per-run group
    # so the long sequential profile can complete without being
    # cancelled by the next push to main.
    concurrency:
      group: ${{ github.event.inputs.profile_sequential == 'true' && format('pages-build-profile-{0}', github.run_id) || 'pages-build' }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    # GitHub free runners cap at 360 min — match it explicitly so cold-start
    # builds (e.g. first run with a heavy plugin like jobOgImagesPlugin
    # rendering ~2100 PNGs from scratch) don't fail on the default 6 h
    # ceiling and the failure mode is obvious in the logs if it happens.
    timeout-minutes: 360
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_first.outputs.page_url }}
    steps:
      # Free ~25-30 GB on the ubuntu-latest runner before any cache restore
      # or build output lands on disk. Without this the runner ships with
      # only ~14 GB free on / and the build crashes mid-Vite-emit with
      # "No space left on device" — the build step's log file goes missing
      # from the run archive entirely because the worker dies before logs
      # flush. We delete only toolchains this repo never uses (Android SDK,
      # .NET, Haskell, CodeQL, Swift, Boost). Node 22, npm cache, and
      # Python tooling stay intact.
      - name: Free disk space (remove unused toolchains)
        shell: bash
        run: |
          echo "::group::Disk usage BEFORE cleanup"
          df -h /
          echo "::endgroup::"
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /usr/local/share/boost &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          sudo rm -rf /usr/share/swift &
          wait
          echo "::group::Disk usage AFTER cleanup"
          df -h /
          echo "::endgroup::"

      - name: Record build job start time
        # Captured here (immediately after disk cleanup, before any cache
        # restore) so the wall-clock total emitted by the `Build profile
        # summary` step reflects the full job duration. Used to detect
        # CI-level regressions (cache restore slowdowns, runner queue,
        # plugin emit growth) without needing to query the GH API.
        shell: bash
        run: echo "$(date +%s)" > /tmp/job-start.txt

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          # cache: 'npm' rimosso — gestiamo node_modules direttamente sotto

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
              # Nessun restore-keys intenzionalmente: node_modules parziali = dipendenze
              # fantasma. Se package-lock.json cambia, si reinstalla tutto da zero.

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          else
            echo "⚠️ Firebase secrets not set — Remote Config secrets will not be loaded."
          fi
          if [ -f /tmp/firebase-sa.json ]; then
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      - name: Load secrets from Remote Config
        run: node scripts/load-rc-env.mjs

      - name: Cache assemble-jobs output
        uses: actions/cache@v5
        with:
          path: .cache/assemble-jobs
          # Hash inputs cover ALL slice files. When ANY of them is touched
          # (by translate-pending, orchestrate-crawlers, or individual
          # crawler workflows) → key changes → miss. Restore-keys cascade
          # to the most recent OS-matching cache when no exact hit.
          key: assemble-jobs-${{ runner.os }}-${{ hashFiles('data/jobs/by-crawler/**/*.json', 'data/jobs/expired/by-crawler/**/*.json', 'data/jobs-crawler-summaries/by-crawler/**/*.json') }}
          restore-keys: |
            assemble-jobs-${{ runner.os }}-

      - name: Cache per-job OG images
        uses: actions/cache@v5
        with:
          path: .cache/og-jobs
          # Invalidate the FULL cache (forcing all 2100 cards to re-render)
          # only when the design changes: plugin source, fonts, or the logo
          # manifest (visual content). New jobs hit the restore-keys cascade
          # and get their PNG rendered on-demand without invalidating the
          # rest. The restore-keys ensure we always start with the most
          # recent OS-matching cache when the exact key misses.
          key: og-jobs-${{ runner.os }}-${{ hashFiles('build-plugins/jobOgImagesPlugin.ts', 'public/fonts/Roboto-*.ttf', 'data/company-logos-manifest.json') }}
          restore-keys: |
            og-jobs-${{ runner.os }}-

      - name: Assemble jobs dataset from per-crawler slices
        run: node scripts/assemble-jobs-dataset.mjs --stats

      - name: Housekeeping (cross-crawler dedup + locale hardening)
        env:
          JOBS_SKIP_URL_VALIDATION: '1'
        run: node scripts/cleanup-jobs.mjs

      - name: Refresh weekly-employers footer link list (F5 link-graph closer)
        # Regenerates data/weekly-employers-top-pairs.json from current jobs
        # using the SAME logic the build plugin uses to materialise pages.
        # Guarantees footer hrefs in WeeklyEmployersTeaser always point at
        # static pages that exist in dist/, eliminating SPA-shell 404s.
        run: node scripts/refresh-weekly-employers-top-pairs.mjs

      - name: Mine all job slugs for comprehensive 404 coverage
        run: node scripts/mine-all-job-slugs.mjs

      # Cluster-pages cache REMOVED (2026-05-09).
      # Build instrumentation on 5 recent deploys showed:
      #   - cache MISS (4/5 runs, jobs.json invalidates daily via cron):
      #       restore 265s + plugin re-emit 652s + Post Cache tar+zstd
      #       of ~106k files → 844 MB compressed = ~1020s
      #       → ~21 min cache overhead to save ~0s of work
      #   - cache HIT (1/5 runs, blog/code-only push):
      #       ~3 min cache I/O to save ~10 min of plugin emit (net positive)
      #   - HIT-rate ≈ 20%; expected build saving = 0.2×10.5 - 0.8×21.4
      #       = -15.6 min/build (negative)
      # Plus a structural bug: saveToCache() wipes only the same-key subdir,
      # so prior runs' subdirs accumulate under .cache/related-search-clusters/
      # and inflate the tarball indefinitely.
      # Same anti-pattern documented in docs/CACHE-EXPERIMENT.md for the
      # plugin-level cache removed 2026-05-04.
      # Plugin's internal cache (saveToCache/tryRestoreFromCache) is disabled
      # at runtime via RELATED_SEARCH_CLUSTERS_NO_CACHE=1 in the Build env
      # below — without the GH cache wrapper, the .cache/ directory on the
      # ephemeral runner is throwaway, so internal save is wasted I/O.

      # Job popularity is refreshed once a day by refresh-job-popularity.yml
      # and committed to data/job-popularity.json. The build reads the file
      # directly — no Firestore read on every push.

      - name: Cache responsive image thumbnails
        id: thumb-cache
        uses: actions/cache@v5
        with:
          path: |
            public/images/blog/thumbnails
            public/images/places/thumbnails
          key: thumbnails-v2-${{ github.run_id }}
          restore-keys: |
            thumbnails-v2-

      - name: Generate responsive image thumbnails
        run: node scripts/generate-image-thumbnails.mjs

      - name: Restore Clarity asset cache from previous deploys
        uses: actions/cache@v5
        with:
          path: .clarity-asset-cache
          key: clarity-assets-${{ github.run_number }}
          restore-keys: clarity-assets-

      - name: Cleanup stale news sitemap entries
        run: node scripts/cleanup-news-sitemap.mjs

      - name: Cleanup stale job HTML (orphans from prior incremental builds)
        # vite.config.ts uses emptyOutDir:false to preserve clarity assets
        # and admin data, but that leaves orphan job HTML from prior builds
        # on disk when a slug is renamed/removed. The title-uniqueness audit
        # then flags those orphans as duplicates of the freshly-emitted
        # canonical pages. Wipe the per-locale job-detail trees before build
        # so jobsSeoPagesPlugin re-emits a clean set every run.
        run: |
          rm -rf dist/cerca-lavoro-ticino \
                 dist/en/find-jobs-ticino \
                 dist/de/jobs-im-tessin \
                 dist/fr/trouver-emploi-tessin \
                 dist/cerca-lavoro-ticino.html \
                 dist/en/find-jobs-ticino.html \
                 dist/de/jobs-im-tessin.html \
                 dist/fr/trouver-emploi-tessin.html

      - name: Cache Vite optimized deps + AST cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.vite
            .vite-cache
          key: vite-${{ runner.os }}-${{ hashFiles('package-lock.json', 'vite.config.ts', 'build-plugins/**/*.ts') }}
          restore-keys: |
            vite-${{ runner.os }}-

      # Cache PDF whitepapers. The pdfWhitepapersPlugin generates 4 large
      # PDFs every build (~480s total in deploy run #25039504369). Source
      # content lives under services/locales/blog-body/it/*.ts and changes
      # rarely, so most builds can short-circuit by reading the cached PDF.
      #
      # The plugin maintains `.build-cache/pdf-manifest.json` keyed by
      # filename → sha256(markdown + render-version). On cache restore the
      # cached PDFs land back in `.build-cache/pdf-cache/` and the plugin
      # skip path copies them straight into dist/guides/.
      #
      # Cache key inputs:
      #   - the plugin source (any rendering change must invalidate)
      #   - the 4 blog-body files the GUIDES array points at
      - name: Cache PDF whitepapers
        uses: actions/cache@v5
        with:
          path: |
            .build-cache/pdf-manifest.json
            .build-cache/pdf-cache/**/*.pdf
            dist/guides/**/*.pdf
          key: pdf-${{ runner.os }}-${{ hashFiles('build-plugins/pdfWhitepapersPlugin.ts', 'services/locales/blog-body/it/guida-completa-frontaliere.ts', 'services/locales/blog-body/it/permesso-g-vantaggi-svantaggi.ts', 'services/locales/blog-body/it/lamal-vs-ssn-decisione.ts', 'services/locales/blog-body/it/trovare-lavoro-ticino.ts') }}
          restore-keys: |
            pdf-${{ runner.os }}-

      # Plugin-level build cache REMOVED (commit TBD).
      # See docs/CACHE-EXPERIMENT.md for the data: caching the per-plugin
      # output cost ~11 min per deploy more than just regenerating, because
      # (a) the 982 MB tarball Post Cache step took ~6 min, and (b) restore
      # I/O for the two big plugins (salary-hub 3,473 files, jobs-seo 204k
      # files) was slower than fresh generation.
      # `data/jobs.json` assembly cache (next step above) stays — it's net
      # positive (~60s saved, ~28 MB tarball).

      - name: Build
        env:
          # UV_THREADPOOL_SIZE=64 was tested in commit 119475af96 (run
          # 25610456421, profile_sequential): jobs-seo-pages flush stayed
          # 143.8s → 141.9s (~0% change), and post-walk-coordinator
          # REGRESSED 69s → 83s (+14s) — likely thread-contention on the
          # 4-vCPU runner. The flush bottleneck is NOT libuv threadpool;
          # the actual hot path is CPU-bound (content-hash sha256 +
          # sharedWriteRegistry claim()). Knob removed; investigate the
          # real bottleneck instead. See data/build-perf-history.md.
          BUILD_PROFILE: '1'
          # ALWAYS sequential on the GH free-tier runner (2 vCPU / 7 GB).
          # Empirical comparison on the same source tree (2026-05-07):
          #   sequential build job: 12m41s, peak heap ~max(single plugin)
          #   parallel   build job: 17m48s, peak heap Σ(overlap) → OOM at
          #     18k cluster pages (run a7f28ce129) and 60k+ soft-landings
          #     (run e9c8ba70bb).
          # The runner has too few cores / too little RAM for parallel
          # closeBundle to win: every plugin's wall is INFLATED by
          # CPU+memory+disk contention with peer plugins, sometimes by
          # 3-5×. Forcing sequential gives faster builds AND eliminates
          # the OOM risk that was blocking MIN_JOB_COUNT=1 (50k cluster
          # pages). The original `profile_sequential` workflow_dispatch
          # input now only controls whether the deploy steps are skipped
          # (for profile-only investigation runs).
          #
          # PARALLEL was the default 2026-05-10 → 2026-05-12 after run
          # 25612758703 measured build job wall 716s → 634s = -82s
          # / -11.5% with NO OOM. The May 9-10 memory optimizations
          # (inverted index in cluster plugin, bridge-direct emit
          # cluster + jobs-seo, auto-flush 5000) cap per-plugin peak
          # heap at ~150 MB so 4-5 concurrent closeBundle hooks stayed
          # well under the 7 GB ubuntu-latest budget at that scale.
          #
          # FLIPPED BACK TO SEQUENTIAL 2026-05-12 (run 25737586562 +
          # 25733510850, docs/PROFILE-MAY12.md). Post-cathedral-expansion
          # the build crossed the contention crossover point:
          #   parallel build job:   1631s (run 25733510850, 2026-05-12)
          #   sequential build job: 1180s (run 25737586562, 2026-05-12)
          #   Δ = -451s = -28% wall, sequential WINS.
          # Cause: cathedral added ~16k new SEO pages + heavier per-canton
          # work; job-og-images's 4-worker pool now degrades 15× in
          # parallel (903s vs 61s sequential, [profile-detail] confirms
          # cpu_s=231 → 4-worker @ 96% efficiency in sequential, vs
          # event-loop starvation in parallel). The ~12-plugin "cluster
          # at 350s wall" was pure starvation: cpu_s = 0.12-3.16 for
          # plugins reporting 350s — they were waiting, not working.
          # Sequential build also restores the silent-tail signal:
          # jobs-seo Flushed→profile gap goes from 38s parallel to 0s
          # sequential.
          #
          # Parallel mode is opt-in via `parallel_plugins=true` dispatch
          # input for A/B testing or measuring how the crossover moves
          # as build scale changes. `profile_sequential=true` still gates
          # the deploy-step skips for investigation-only runs (it no
          # longer needs to toggle SEQUENTIAL_PROFILE — that's now on
          # by default).
          #
          # Logic: parallel ONLY when parallel_plugins=true explicitly.
          # Everything else (push, cron, bare dispatch, profile dispatch)
          # gets sequential.
          SEQUENTIAL_PROFILE: ${{ github.event.inputs.parallel_plugins == 'true' && '' || '1' }}
          # Opt-in jobsSeoPagesPlugin per-category profiler. Emits a sorted
          # table at end of the plugin's closeBundle showing count + total +
          # avg + p50 + p99 + min + max (ms) for each emission category
          # (active-job, expired-soft-landing, previous-slug-bridge, etc.).
          JOBS_SEO_PROFILE: ${{ github.event.inputs.profile_jobs_seo == 'true' && '1' || '' }}
          # Opt-in weeklyEmployersPlugin per-category profiler. Emits a sorted
          # table at end of the plugin's closeBundle showing count + total +
          # avg + p50 + p99 + min + max (ms) for each phase (cleanup,
          # load-jobs, load-snapshots, generate-pages, render-current-week,
          # render-archive-week, companycity-pass1-stats,
          # render-company-city-page, process-page, flush, sitemap-write).
          WEEKLY_EMPLOYERS_PROFILE: ${{ github.event.inputs.profile_weekly_employers == 'true' && '1' || '' }}
          # Disable the plugin-internal save/restore for related-search-clusters
          # since the GH Actions cache wrapper around .cache/related-search-clusters/
          # was removed (see comment in cluster-pages cache section above). On the
          # ephemeral CI runner the .cache/ directory is throwaway, so writing
          # ~106k cached HTML copies via fs.copyFileSync is pure waste (~50s/build).
          # The plugin still emits to dist/ as normal — only the disk-side cache
          # path is short-circuited. Keeps local dev paths (where the cache IS
          # persisted) unchanged: unset this flag locally to re-enable.
          RELATED_SEARCH_CLUSTERS_NO_CACHE: '1'
          # POST_WALK_WORKERS rollback removed (commit 4b412bc8a + 36dfd0e9c
          # added explicit `.ts` extensions to the two extension-less local
          # imports the worker tree pulled in — `./blogContextualLinksData`
          # and `./shared/hreflangGuard`). Workers now resolve cleanly under
          # tsx 4.x `--import`. Default = max(availableParallelism, cpus.length).
          #
          # WRITE_COLLISION_DUMP gated to workflow_dispatch input
          # `write_collision_dump` (default false). When enabled,
          # sharedWriteRegistry dumps every unique-by-hash content claim()'d
          # during the build to `dist/.write-collisions-data/<hash>.html`
          # — that's ~200k synchronous writeFileSync calls per build,
          # 99.8% of which are pruned at end (only ~330 referenced by
          # colliding paths survive). The collisions JSON report is
          # emitted unconditionally, so push deploys still surface paths
          # + plugins + callsites of every collision; only the raw HTML
          # payload requires the dump dir. Flip on via
          # `gh workflow run deploy.yml -f write_collision_dump=true`
          # when triaging a specific collision and you need the rendered
          # HTML. Saves ~100-200s/build on push events.
          WRITE_COLLISION_DUMP: ${{ github.event.inputs.write_collision_dump == 'true' && '1' || '' }}
        shell: bash
        run: |
          set -o pipefail
          npm run build:ci 2>&1 | tee /tmp/build.log

      - name: Build profile summary
        if: always()
        shell: bash
        run: |
          # Total job wall-clock: emitted first so it shows at the top of
          # the summary even when the profile log is missing or partial.
          if [ -f /tmp/job-start.txt ]; then
            START_TS="$(cat /tmp/job-start.txt)"
            NOW_TS="$(date +%s)"
            ELAPSED_S=$((NOW_TS - START_TS))
            ELAPSED_M=$((ELAPSED_S / 60))
            ELAPSED_R=$((ELAPSED_S % 60))
            {
              echo "## Build job wall-clock"
              echo ""
              echo "**${ELAPSED_S}s** (${ELAPSED_M}m ${ELAPSED_R}s) from job start to profile summary."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ ! -f /tmp/build.log ]; then
            echo "Build log not found — profiling skipped" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Build profile (per-plugin closeBundle time)"
            echo ""
            echo "| Plugin | Time (s) |"
            echo "|---|---:|"
            grep -E '^\[profile\]' /tmp/build.log \
              | sed -E 's/^\[profile\] +//; s/ +([0-9.]+)s$/|\1/' \
              | awk -F'|' '{printf "| %s | %s |\n", $1, $2}' \
              | sort -t'|' -k3 -nr
            echo ""
            grep -E '^\[profile-total\]' /tmp/build.log | sed 's/^\[profile-total\] /**/' || true
            # Detailed per-plugin wall+CPU table is emitted whenever
            # SEQUENTIAL_PROFILE=1 is set in the Build step env (which
            # is now the always-on default — see comment there). The
            # [profile-detail] marker is emitted alongside the [profile]
            # line by profilePlugin.ts; per-plugin wall is now reliable
            # because plugins no longer overlap.
            if grep -qE '^\[profile-detail\]' /tmp/build.log; then
              echo ""
              echo "## Build profile — sequential, per-plugin wall + CPU"
              echo ""
              echo "| Plugin | Wall (s) | CPU (s) |"
              echo "|---|---:|---:|"
              # [profile-detail] <name padded> wall_s=N.NN cpu_s=N.NN
              grep -E '^\[profile-detail\]' /tmp/build.log \
                | sed -E 's/^\[profile-detail\] +//' \
                | awk '{
                    name=""; for(i=1;i<=NF-2;i++) name = name (i>1?" ":"") $i;
                    wall=$(NF-1); cpu=$NF;
                    sub(/wall_s=/, "", wall); sub(/cpu_s=/, "", cpu);
                    printf "| %s | %s | %s |\n", name, wall, cpu
                  }' \
                | sort -t'|' -k3 -nr
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: SPA fallback (GitHub Pages serves 404.html for unknown paths)
        run: cp dist/index.html dist/404.html

      - name: Capture pre-deploy sitemap URLs (for IndexNow diff)
        if: github.event.inputs.profile_sequential != 'true'
        continue-on-error: true
        run: node scripts/capture-deployed-sitemaps.mjs

      - name: Upload pre-deploy snapshot for post-deploy validation
        if: github.event.inputs.profile_sequential != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: pre-deploy-snapshot-${{ github.run_id }}
          path: /tmp/pre-deploy-sitemap-urls.json
          retention-days: 1
          if-no-files-found: ignore

      # Pack the new sitemap URLs (extracted from dist/sitemap-*.xml) into
      # /tmp/new-sitemap-urls.json so validate-live can submit them to
      # IndexNow / Google Indexing API without scraping the live site or
      # downloading the 1.5 GB github-pages artifact. Bundled together
      # with the pre-deploy snapshot into a single small `sitemaps-`
      # artifact for convenience.
      - name: Pack new sitemap URLs from dist/
        if: github.event.inputs.profile_sequential != 'true'
        continue-on-error: true
        run: |
          node -e "
            const fs = require('node:fs');
            const path = require('node:path');
            const distDir = 'dist';
            if (!fs.existsSync(distDir)) {
              console.error('dist/ missing — skipping new-sitemap-urls.json');
              process.exit(0);
            }
            const files = fs.readdirSync(distDir)
              .filter(f => /^sitemap-.+\.xml\$/.test(f) && f !== 'sitemap-index.xml')
              .sort();
            const perSitemap = {};
            const all = new Set();
            for (const f of files) {
              const xml = fs.readFileSync(path.join(distDir, f), 'utf8');
              const urls = [...new Set([...xml.matchAll(/<loc>([^<]+)<\/loc>/g)].map(m => m[1].trim()))].sort();
              perSitemap[f] = urls;
              for (const u of urls) all.add(u);
            }
            const out = {
              version: 2,
              capturedAt: new Date().toISOString(),
              source: 'dist',
              perSitemap,
              _allUrls: [...all].sort(),
            };
            fs.writeFileSync('/tmp/new-sitemap-urls.json', JSON.stringify(out));
            console.log('📦 Packed ' + out._allUrls.length + ' new sitemap URLs across ' + Object.keys(perSitemap).length + ' files → /tmp/new-sitemap-urls.json');
          "

      - name: Stage sitemaps bundle (pre-deploy + new + build-id)
        if: github.event.inputs.profile_sequential != 'true'
        continue-on-error: true
        run: |
          mkdir -p /tmp/sitemaps-bundle
          cp -f /tmp/pre-deploy-sitemap-urls.json /tmp/sitemaps-bundle/ 2>/dev/null || true
          # build-id.txt is consumed by `wait-for-pages-propagation.mjs`
          # in validate-live to verify the live site is serving THIS deploy.
          # Bundling it here means validate-live can run without
          # downloading the 1.5 GB github-pages artifact.
          cp -f dist/build-id.txt /tmp/sitemaps-bundle/ 2>/dev/null || true
          cp -f /tmp/new-sitemap-urls.json /tmp/sitemaps-bundle/ 2>/dev/null || true
          ls -la /tmp/sitemaps-bundle/

      # Single small artifact (~tens of KB) consumed by validate-live for
      # IndexNow / Google Indexing diff. Lets validate-live skip the
      # 1.5 GB github-pages artifact entirely.
      - name: Upload sitemaps bundle artifact
        if: github.event.inputs.profile_sequential != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: sitemaps-${{ github.run_id }}
          path: /tmp/sitemaps-bundle/
          retention-days: 1
          if-no-files-found: ignore

      - name: Merge previous CSS/JS assets for Clarity recordings
        # Runs as the LAST mutation of dist/ before upload, on purpose.
        # Earlier in the pipeline this step ran right after the build, but
        # that meant every downstream audit/walker (Audit SPA bundle,
        # write-collisions analysis, the parallel post-build pool) ran on
        # a dist/ that contained both fresh hashed bundles AND old hashed
        # bundles merged from the previous deploy's Clarity cache. Audits
        # were forced to whitelist the older filename patterns, and any
        # future audit that touches dist/assets/ has to repeat that
        # whitelisting. Moving the merge here keeps `dist/` byte-identical
        # to this build's output through every gate, then injects the
        # Clarity preservation overlay only into the artifact bytes that
        # actually ship to GitHub Pages.
        # The --snapshot pass updates .clarity-asset-cache/ with whatever
        # is in dist/assets/ at this point (= fresh build + merged old
        # generations), so the next run starts from a complete picture.
        continue-on-error: true
        run: |
          node scripts/preserve-clarity-assets.mjs --merge
          node scripts/preserve-clarity-assets.mjs --snapshot

      # ┌─ Pages artifact pipeline (two steps, one logical operation) ─┐
      # │                                                                │
      # │  Step A : tar dist/ as a plain UNCOMPRESSED archive            │
      # │  Step B : upload via upload-artifact@v7 with compression 9     │
      # │                                                                │
      # │  Why split:                                                    │
      # │  - actions/upload-pages-artifact@v5 does not expose            │
      # │    compression-level — it forwards path to upload-artifact     │
      # │    at the default level 6. With ~118k HTML pages the artifact  │
      # │    crosses the 1 GB Pages warning threshold, so we replicate   │
      # │    its internal tar manually and pass our own knobs to         │
      # │    upload-artifact@v7.                                         │
      # │                                                                │
      # │  Why this is NOT a parallel-gzipped tar:                       │
      # │  Two attempts to substitute `tar | pigz` and use compression-  │
      # │  level 0 on upload-artifact ended badly:                       │
      # │  - run 25308327381 (`pigz -1`): 1.6 GB artifact, exceeded the  │
      # │    1 GB Pages cap → "Deployment failed".                       │
      # │  - run 25309021889 (`pigz -9`): artifact dropped to 1.35 GB    │
      # │    but `actions/deploy-pages@v5` still failed with             │
      # │    "Deployment temporarily failed → Deployment failed". The    │
      # │    likely cause is that the Pages backend does NOT accept a    │
      # │    pre-gzipped tar inside the artifact zip — its extractor     │
      # │    expects uncompressed tar named `artifact.tar`, even though  │
      # │    a CLI `tar -xf` would auto-detect the gzip magic bytes.     │
      # │  Lesson: trade time for compatibility. Pages format is fixed   │
      # │  to plain tar, so we keep the tar uncompressed and let         │
      # │  upload-artifact compress at level 9.                          │
      # │                                                                │
      # │  Background: PATH 3 (tar in bg during post-build pool) was     │
      # │  tried in commit 11b65de81 and reverted — tar contended with   │
      # │  the 4 heaviest dist/-walking audits and net post-build went   │
      # │  +98s.                                                         │
      # └────────────────────────────────────────────────────────────────┘
      - name: Pack dist/ into Pages tar archive
        if: github.event.inputs.profile_sequential != 'true'
        run: |
          tar \
            --dereference --hard-dereference \
            --directory dist \
            -cf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
          # Surface size early so a regression past the 1 GB Pages
          # threshold is visible in the workflow log right after pack
          # (instead of only at the deploy-pages "Deployment failed"
          # tail) — the artifact size is the binding constraint.
          ls -lh "$RUNNER_TEMP/artifact.tar"

      - name: Upload Pages artifact (compression-level 9)
        if: github.event.inputs.profile_sequential != 'true'
        id: upload-pages-artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error
          # Level 9 = max deflate compression on the zip envelope. Pages
          # backend extracts the zip first, so our content gets the best
          # compression ratio in transit (~970 MB vs ~1.21 GB at level 6).
          compression-level: 9

      - name: Upload write-collisions analysis
        if: always() && github.event.inputs.profile_sequential != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: write-collisions-analysis-${{ github.run_id }}
          path: |
            dist/.write-collisions.json
            dist/.write-collisions-data/
          retention-days: 7
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Detect previous-slug winners changes
        if: github.event.inputs.profile_sequential != 'true'
        id: winners_changed
        run: |
          if git diff --quiet -- data/previous-slug-winners.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload previous-slug winners for post-deploy validation
        if: github.event.inputs.profile_sequential != 'true' && steps.winners_changed.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: winners-${{ github.run_id }}
          path: data/previous-slug-winners.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Report failure to Linear (build)
        if: failure()
        continue-on-error: true
        run: |
          node scripts/lib/linear-issue-creator.mjs \
            --title "CI Failure (build): ${{ github.workflow }} — run ${{ github.run_number }}" \
            --description "## Build fallito
          **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** ${{ github.ref_name }}
          **Trigger:** ${{ github.event_name }}" \
            --priority 1 \
            --label Bug \
            --workflow "${{ github.workflow }}"

  # ───────────────────────────────────────────────────────────────────────
  # deploy: publish dist/ to GitHub Pages (actions/deploy-pages reads the
  # `github-pages` artifact from this run automatically). Inherits the
  # `pages-deploy` concurrency group so build+deploy together hold the
  # serial Pages lock for the upload+publish sequence — but each job
  # individually rilascia la lock when complete.
  # ───────────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    if: |
      success() &&
      github.event.inputs.profile_sequential != 'true'
    # Concurrency lock applies HERE only — `actions/deploy-pages@v5` is
    # the singleton: GitHub Pages allows one active deployment at a time
    # repo-wide. Build (above) has no concurrency so multiple builds
    # progress in parallel; the lock is acquired only at the publish
    # boundary.
    #
    # cancel-in-progress: false is best-effort: GitHub Actions caps the
    # group at 1 running + 1 pending. When a third deploy enters, the
    # PREVIOUSLY-pending one gets cancelled (i.e. the middle one in a
    # burst is dropped, the first and last survive). For a cron-driven
    # site where the latest deploy already contains everything from the
    # missed intermediate ones, this is the desired behaviour.
    concurrency:
      group: 'pages-deploy'
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_first.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      # GitHub Pages allows only one deployment at a time. When concurrent
      # pushes trigger this workflow, the second run can hit "in progress
      # deployment" errors. Retry once after a short wait to handle this.
      - name: Deploy to GitHub Pages
        id: deployment_first
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait for previous Pages deployment to finish
        if: steps.deployment_first.outcome == 'failure'
        run: |
          echo "::warning::First deploy attempt failed (likely Pages busy). Retrying in 30s..."
          sleep 30

      - name: Deploy to GitHub Pages (retry)
        id: deployment
        if: steps.deployment_first.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Fail if both deploy attempts failed
        if: steps.deployment_first.outcome == 'failure' && steps.deployment.outcome != 'success'
        run: exit 1

      - name: Save deploy metadata to Firestore
        if: success()
        env:
          ARTICLE_ID: ${{ github.event.inputs.article_id }}
          ARTICLE_URL: ${{ github.event.inputs.article_url }}
          OG_TITLE: ${{ github.event.inputs.og_title }}
          OG_DESCRIPTION: ${{ github.event.inputs.og_description }}
          OG_IMAGE: ${{ github.event.inputs.og_image }}
          ARTICLE_CATEGORY: ${{ github.event.inputs.article_category }}
        run: |
          node scripts/deploy-registry.mjs save \
            --run-id="${{ github.run_id }}" \
            --sha="${{ github.sha }}" \
            --trigger="${{ github.event_name }}" \
            --article-id="${ARTICLE_ID}" \
            --article-url="${ARTICLE_URL}" \
            --og-title="${OG_TITLE}" \
            --og-description="${OG_DESCRIPTION}" \
            --og-image="${OG_IMAGE}" \
            --article-category="${ARTICLE_CATEGORY}"

      - name: Report failure to Linear (deploy)
        if: failure()
        continue-on-error: true
        run: |
          node scripts/lib/linear-issue-creator.mjs \
            --title "CI Failure (deploy): ${{ github.workflow }} — run ${{ github.run_number }}" \
            --description "## Deploy fallito
          **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** ${{ github.ref_name }}
          **Trigger:** ${{ github.event_name }}" \
            --priority 1 \
            --label Bug \
            --workflow "${{ github.workflow }}"

  # ───────────────────────────────────────────────────────────────────────
  # validate-dist: dist-side gates (bfs-depth, text-html-ratio, ...).
  # Runs in PARALLEL with `deploy` — only needs `build` (the artifact).
  # ───────────────────────────────────────────────────────────────────────
  validate-dist:
    needs: build
    if: |
      success() &&
      github.event.inputs.profile_sequential != 'true'
    uses: ./.github/workflows/post-deploy-validate-dist.yml
    with:
      deploy_run_id: ${{ github.run_id }}
      deploy_event_name: ${{ github.event_name }}
    secrets: inherit
    permissions:
      contents: read    # checkout
      actions: read     # download-artifact same-run

  # ───────────────────────────────────────────────────────────────────────
  # validate-live: live smoke + social posting + indexing submission.
  # Needs `deploy` to have published the new dist before fetching live.
  # ───────────────────────────────────────────────────────────────────────
  validate-live:
    needs: deploy
    if: |
      success() &&
      github.event.inputs.profile_sequential != 'true'
    uses: ./.github/workflows/post-deploy-validate-live.yml
    with:
      deploy_run_id: ${{ github.run_id }}
      deploy_event_name: ${{ github.event_name }}
    secrets: inherit
    permissions:
      contents: write   # sync previous-slug winners (git push)
      actions: read     # download small artifacts (sitemaps, winners)

  # ───────────────────────────────────────────────────────────────────────
  # publish: side-effects + mark last_known_good. Runs ONLY when build,
  # deploy, validate-dist, AND validate-live have all succeeded.
  #
  # Side-effects covered:
  #   - Sync previous-slug-winners.json (git push)
  #   - Post to Facebook + LinkedIn (workflow_dispatch only)
  #   - Submit URLs to Google Indexing API + IndexNow + GSC
  #   - Mark this run as last_known_good (rollback target)
  #
  # Why gated AFTER validate-dist (not just deploy): these are
  # IRREVERSIBLE. If validate-dist failed AFTER validate-live succeeded,
  # rollback fired but FB/LinkedIn had already announced URLs that now
  # point to the rolled-back dist (mismatch or 404). IndexNow had pinged
  # Bing on the bad-dist URLs, baking the bad version into search engines.
  #
  # Marking last_known_good is also part of publish so a failed
  # validate-dist can never accidentally mark a bad dist as the rollback
  # target (the original 25431484293 self-rollback bug).
  # ───────────────────────────────────────────────────────────────────────
  publish:
    needs: [deploy, validate-dist, validate-live]
    if: |
      success() &&
      github.event.inputs.profile_sequential != 'true'
    uses: ./.github/workflows/post-deploy-publish.yml
    with:
      deploy_run_id: ${{ github.run_id }}
      deploy_event_name: ${{ github.event_name }}
    secrets: inherit
    permissions:
      contents: write   # sync previous-slug winners (git push)
      actions: read     # download small artifacts (sitemaps, winners)

  # ───────────────────────────────────────────────────────────────────────
  # rollback: revert Pages to last_known_good if either validate fails.
  # Still-live guard: skip rollback if a newer deploy has already replaced
  # ours on Pages — the bad version is gone, no need to clobber the new
  # good one.
  # ───────────────────────────────────────────────────────────────────────
  rollback:
    needs: [deploy, validate-dist, validate-live]
    if: |
      always() &&
      (needs.validate-dist.result == 'failure' || needs.validate-live.result == 'failure') &&
      needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      # `actions: write` is required so the rollback can DELETE the failed
      # build's `github-pages` artifact before re-uploading the last-known-good
      # one — otherwise actions/deploy-pages@v5 sees two artifacts with the
      # same name in the same run and fails with "Multiple artifacts named
      # 'github-pages' were unexpectedly found for this workflow run."
      actions: write
    environment:
      name: github-pages
      url: ${{ steps.rollback_deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      # Validate-dist + validate-live run concurrently with the next
      # deploy's build. By the time this rollback fires, a newer deploy
      # may already be live on Pages — reverting our (failed) deploy
      # would clobber a valid newer one. Check the live Pages deployment
      # SHA before proceeding.
      - name: Verify our deploy is still live (still-live guard)
        id: still-live
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          live_sha=$(gh api \
            "repos/${{ github.repository }}/deployments?environment=github-pages&per_page=1" \
            --jq '.[0].sha // empty')
          my_sha="${{ github.sha }}"
          echo "Live Pages deployment SHA: ${live_sha:-(unknown)}"
          echo "My deploy SHA:             $my_sha"
          if [ -z "$live_sha" ]; then
            echo "::warning::Could not resolve live deployment SHA — proceeding with rollback as best-effort"
            echo "still_live=true" >> "$GITHUB_OUTPUT"
          elif [ "$live_sha" = "$my_sha" ]; then
            echo "✅ My deploy is still live — rollback is the right action."
            echo "still_live=true" >> "$GITHUB_OUTPUT"
          else
            echo "ℹ️ A newer deploy ($live_sha) has already replaced mine on Pages."
            echo "   Rollback is a no-op — skipping. The newer deploy already removed the bad version."
            echo "still_live=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get last known good deploy
        if: steps.still-live.outputs.still_live == 'true'
        id: last-good
        run: |
          DATA=$(node scripts/deploy-registry.mjs get-good 2>/dev/null || echo '{}')
          RUN_ID=$(echo "$DATA" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).runId||'')}catch{console.log('')}})")
          SHA=$(echo "$DATA" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).sha||'')}catch{console.log('')}})")
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          if [ -z "$RUN_ID" ]; then
            echo "::warning::No last_known_good found in Firestore — cannot rollback."
          else
            echo "Rolling back to run $RUN_ID (sha $SHA)"
          fi

      - name: Fail if no last known good deploy is available
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id == ''
        run: |
          echo "::error::No last_known_good deploy found in Firestore. Cannot perform rollback."
          exit 1

      # Cross-run download. Pin to the SPECIFIC artifact id (resolved via
      # gh api) to avoid the "Multiple artifacts named github-pages were
      # unexpectedly found for this workflow run" error that
      # actions/download-artifact@v5 throws when the source run had both
      # a deploy AND a self-rollback (which uploads a second
      # `github-pages` artifact for re-publishing).
      - name: Resolve last-good github-pages artifact id
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id != ''
        id: last-good-artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Pick the FIRST `github-pages` (oldest = the original deploy
          # upload, not a later rollback re-upload).
          artifact_id=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ steps.last-good.outputs.run-id }}/artifacts" \
            --jq '[.artifacts[] | select(.name == "github-pages")] | sort_by(.created_at) | .[0].id // empty')
          if [ -z "$artifact_id" ]; then
            echo "::error::No github-pages artifact in run ${{ steps.last-good.outputs.run-id }}"
            exit 1
          fi
          echo "id=$artifact_id" >> "$GITHUB_OUTPUT"
          echo "Resolved last-good github-pages artifact id: $artifact_id"

      - name: Download last known good GitHub Pages artifact (by id)
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id != '' && steps.last-good-artifact.outputs.id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p ./rollback-archive
          gh api "repos/${{ github.repository }}/actions/artifacts/${{ steps.last-good-artifact.outputs.id }}/zip" \
            > ./rollback-archive/__artifact.zip
          unzip -q -o ./rollback-archive/__artifact.zip -d ./rollback-archive
          rm -f ./rollback-archive/__artifact.zip

      - name: Reconstruct rollback site from downloaded Pages artifact
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id != '' && steps.last-good-artifact.outputs.id != ''
        run: |
          test -f ./rollback-archive/artifact.tar
          mkdir -p ./rollback-dist
          tar -xf ./rollback-archive/artifact.tar -C ./rollback-dist

      # The build job uploaded its own "github-pages" artifact (the failed
      # dist). actions/upload-pages-artifact@v5 always uses the name
      # "github-pages", and actions/deploy-pages@v5 queries by NAME (not
      # id), so a second upload here would surface "Multiple artifacts
      # named 'github-pages'" and fail the rollback. Delete the build's
      # artifact first via the REST API before re-uploading the good one.
      - name: Delete failed deploy's github-pages artifact (so rollback can re-upload)
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id != '' && steps.last-good-artifact.outputs.id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # The build job in THIS run uploaded a github-pages artifact.
          # If there are multiple (rare), delete them all to leave the
          # run with a clean slate before the rollback re-upload.
          ids=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '[.artifacts[] | select(.name == "github-pages") | .id] | .[]')
          if [ -z "$ids" ]; then
            echo "No existing github-pages artifact in this run — nothing to delete."
          else
            for id in $ids; do
              echo "Deleting failed-build artifact id=$id"
              gh api -X DELETE \
                "repos/${{ github.repository }}/actions/artifacts/$id"
            done
          fi

      - name: Re-upload last known good artifact for Pages
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id != '' && steps.last-good-artifact.outputs.id != ''
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./rollback-dist

      - name: Deploy last known good to GitHub Pages
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id != '' && steps.last-good-artifact.outputs.id != ''
        id: rollback_deploy
        uses: actions/deploy-pages@v5

      - name: Report rollback to Linear
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ steps.still-live.outputs.still_live }}" != "true" ]; then
            MSG="## Rollback skippato (newer deploy already live)
          **Validation run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Last good (NOT rolled back):** ${{ steps.last-good.outputs.run-id }}"
          elif [ "${{ steps.rollback_deploy.outcome }}" = "success" ]; then
            MSG="## Rollback eseguito
          **Rollback a run:** ${{ steps.last-good.outputs.run-id }} (sha ${{ steps.last-good.outputs.sha }})
          **Validation run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            MSG="## Rollback fallito
          **Tentato rollback a run:** ${{ steps.last-good.outputs.run-id }} (sha ${{ steps.last-good.outputs.sha }})
          **Validation run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          node scripts/lib/linear-issue-creator.mjs \
            --title "Rollback: post-deploy — run ${{ github.run_number }}" \
            --description "$MSG" \
            --priority 1 \
            --label Bug \
            --workflow "Post-deploy Rollback"
