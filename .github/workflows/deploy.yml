name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/border-wait-current.json'
      - 'data/border-wait-history/**'
  workflow_dispatch:
    inputs:
      article_id:
        description: 'Optional article id to verify live metadata and post to Facebook after deploy'
        required: false
        type: string
      article_url:
        description: 'Optional live article URL for post-deploy metadata verification'
        required: false
        type: string
      og_title:
        description: 'Optional expected OG title for the deployed article'
        required: false
        type: string
      og_description:
        description: 'Optional OG description for the Facebook post copy'
        required: false
        type: string
      og_image:
        description: 'Optional expected OG image for the deployed article'
        required: false
        type: string
      article_category:
        description: 'Optional article category used for Facebook hashtags'
        required: false
        type: string
      profile_sequential:
        description: 'Run a sequential plugin profile (slower build, accurate per-plugin wall+CPU times). Use only for one-off investigations.'
        required: false
        type: boolean
        default: false
      profile_jobs_seo:
        description: 'Enable jobsSeoPagesPlugin per-category profiler (counts + total/avg/p50/p99 timings per emission category). Pair with profile_sequential for clean numbers.'
        required: false
        type: boolean
        default: false
      profile_weekly_employers:
        description: 'Enable weeklyEmployersPlugin per-category profiler (counts + total/avg/p50/p99 timings per phase: cleanup, load-jobs, render-current-week, render-company-city-page, flush, etc.). Pair with profile_sequential for clean numbers.'
        required: false
        type: boolean
        default: false

permissions:
  # This workflow only needs repository read access: the previous-slug winners
  # sync moved to post-deploy-validation.yml, while the deploy itself only
  # uploads artifacts and publishes to GitHub Pages.
  contents: read
  pages: write
  id-token: write

concurrency:
  # GitHub Pages allows only one active deployment at a time. Every trigger —
  # push to main, workflow_dispatch from articles/crawlers/etc. — must share a
  # single queue so deploys run strictly serially. cancel-in-progress is false
  # so each successful deploy can finish publishing and emit its artifacts for
  # the downstream post-deploy validation workflow.
  #
  # Exception: a workflow_dispatch with profile_sequential=true is a build-only
  # investigation run that skips the deploy steps. It uses a per-run group so
  # the long sequential profile can complete without being cancelled by the
  # next push to main, and without blocking real deploys behind it.
  group: ${{ github.event.inputs.profile_sequential == 'true' && format('pages-deploy-profile-{0}', github.run_id) || 'pages-deploy' }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_first.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          # cache: 'npm' rimosso — gestiamo node_modules direttamente sotto

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
              # Nessun restore-keys intenzionalmente: node_modules parziali = dipendenze
              # fantasma. Se package-lock.json cambia, si reinstalla tutto da zero.

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          else
            echo "⚠️ Firebase secrets not set — Remote Config secrets will not be loaded."
          fi
          if [ -f /tmp/firebase-sa.json ]; then
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      - name: Load secrets from Remote Config
        run: node scripts/load-rc-env.mjs

      - name: Assemble jobs dataset from per-crawler slices
        run: node scripts/assemble-jobs-dataset.mjs --stats

      - name: Housekeeping (cross-crawler dedup + locale hardening)
        env:
          JOBS_SKIP_URL_VALIDATION: '1'
        run: node scripts/cleanup-jobs.mjs

      - name: Refresh weekly-employers footer link list (F5 link-graph closer)
        # Regenerates data/weekly-employers-top-pairs.json from current jobs
        # using the SAME logic the build plugin uses to materialise pages.
        # Guarantees footer hrefs in WeeklyEmployersTeaser always point at
        # static pages that exist in dist/, eliminating SPA-shell 404s.
        run: node scripts/refresh-weekly-employers-top-pairs.mjs

      - name: Mine all job slugs for comprehensive 404 coverage
        run: node scripts/mine-all-job-slugs.mjs

      - name: Fetch job popularity data from Firestore
        continue-on-error: true
        run: node scripts/fetch-job-popularity.mjs

      - name: Cache responsive image thumbnails
        id: thumb-cache
        uses: actions/cache@v5
        with:
          path: |
            public/images/blog/thumbnails
            public/images/places/thumbnails
          key: thumbnails-v2-${{ github.run_id }}
          restore-keys: |
            thumbnails-v2-

      - name: Generate responsive image thumbnails
        run: node scripts/generate-image-thumbnails.mjs

      - name: Restore Clarity asset cache from previous deploys
        uses: actions/cache@v5
        with:
          path: .clarity-asset-cache
          key: clarity-assets-${{ github.run_number }}
          restore-keys: clarity-assets-

      - name: Cleanup stale news sitemap entries
        run: node scripts/cleanup-news-sitemap.mjs

      - name: Cleanup stale job HTML (orphans from prior incremental builds)
        # vite.config.ts uses emptyOutDir:false to preserve clarity assets
        # and admin data, but that leaves orphan job HTML from prior builds
        # on disk when a slug is renamed/removed. The title-uniqueness audit
        # then flags those orphans as duplicates of the freshly-emitted
        # canonical pages. Wipe the per-locale job-detail trees before build
        # so jobsSeoPagesPlugin re-emits a clean set every run.
        run: |
          rm -rf dist/cerca-lavoro-ticino \
                 dist/en/find-jobs-ticino \
                 dist/de/jobs-im-tessin \
                 dist/fr/trouver-emploi-tessin \
                 dist/cerca-lavoro-ticino.html \
                 dist/en/find-jobs-ticino.html \
                 dist/de/jobs-im-tessin.html \
                 dist/fr/trouver-emploi-tessin.html

      - name: Cache Vite optimized deps + AST cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.vite
            .vite-cache
          key: vite-${{ runner.os }}-${{ hashFiles('package-lock.json', 'vite.config.ts', 'build-plugins/**/*.ts') }}
          restore-keys: |
            vite-${{ runner.os }}-

      # Cache PDF whitepapers. The pdfWhitepapersPlugin generates 4 large
      # PDFs every build (~480s total in deploy run #25039504369). Source
      # content lives under services/locales/blog-body/it/*.ts and changes
      # rarely, so most builds can short-circuit by reading the cached PDF.
      #
      # The plugin maintains `.build-cache/pdf-manifest.json` keyed by
      # filename → sha256(markdown + render-version). On cache restore the
      # cached PDFs land back in `.build-cache/pdf-cache/` and the plugin
      # skip path copies them straight into dist/guides/.
      #
      # Cache key inputs:
      #   - the plugin source (any rendering change must invalidate)
      #   - the 4 blog-body files the GUIDES array points at
      - name: Cache PDF whitepapers
        uses: actions/cache@v5
        with:
          path: |
            .build-cache/pdf-manifest.json
            .build-cache/pdf-cache/**/*.pdf
            dist/guides/**/*.pdf
          key: pdf-${{ runner.os }}-${{ hashFiles('build-plugins/pdfWhitepapersPlugin.ts', 'services/locales/blog-body/it/guida-completa-frontaliere.ts', 'services/locales/blog-body/it/permesso-g-vantaggi-svantaggi.ts', 'services/locales/blog-body/it/lamal-vs-ssn-decisione.ts', 'services/locales/blog-body/it/trovare-lavoro-ticino.ts') }}
          restore-keys: |
            pdf-${{ runner.os }}-

      # Cache content-hash manifest step DISABLED 2026-04-28 — paired with the
      # disabled bootstrap/finalize plugins in vite.config.ts. The repo's
      # auto-blog/auto-translate churn meant ~80% of deploys had data changes,
      # so the manifest skip rarely fired while costing +30-60s SHA256 every
      # build. To re-enable, uncomment this step AND restore the inline
      # plugins in vite.config.ts.

      - name: Build
        env:
          BUILD_PROFILE: '1'
          # Opt-in via workflow_dispatch input. When set, profilePlugin forces
          # closeBundle hooks to run sequentially so per-plugin wall+CPU times
          # are accurate (parallel execution otherwise overlaps timings).
          # Slower than normal — use only for one-off investigations.
          SEQUENTIAL_PROFILE: ${{ github.event.inputs.profile_sequential == 'true' && '1' || '' }}
          # Opt-in jobsSeoPagesPlugin per-category profiler. Emits a sorted
          # table at end of the plugin's closeBundle showing count + total +
          # avg + p50 + p99 + min + max (ms) for each emission category
          # (active-job, expired-soft-landing, previous-slug-bridge, etc.).
          JOBS_SEO_PROFILE: ${{ github.event.inputs.profile_jobs_seo == 'true' && '1' || '' }}
          # Opt-in weeklyEmployersPlugin per-category profiler. Emits a sorted
          # table at end of the plugin's closeBundle showing count + total +
          # avg + p50 + p99 + min + max (ms) for each phase (cleanup,
          # load-jobs, load-snapshots, generate-pages, render-current-week,
          # render-archive-week, companycity-pass1-stats,
          # render-company-city-page, process-page, flush, sitemap-write).
          WEEKLY_EMPLOYERS_PROFILE: ${{ github.event.inputs.profile_weekly_employers == 'true' && '1' || '' }}
          # POST_WALK_WORKERS rollback removed (commit 4b412bc8a + 36dfd0e9c
          # added explicit `.ts` extensions to the two extension-less local
          # imports the worker tree pulled in — `./blogContextualLinksData`
          # and `./shared/hreflangGuard`). Workers now resolve cleanly under
          # tsx 4.x `--import`. Default = max(availableParallelism, cpus.length).
          #
          # WRITE_COLLISION_DUMP=1 makes sharedWriteRegistry dump every
          # unique-by-hash content claim()'d during the build to
          # `dist/.write-collisions-data/<hash>.html`. After the build, the
          # registry's report plugin prunes that directory to keep only
          # hashes referenced by colliding paths (typically <50 MB out of
          # GBs of intermediate writes). The pruned set is uploaded as the
          # `write-collisions-analysis` artifact for end-of-build analysis.
          WRITE_COLLISION_DUMP: '1'
        shell: bash
        run: |
          set -o pipefail
          npm run build:ci 2>&1 | tee /tmp/build.log

      - name: Build profile summary
        if: always()
        shell: bash
        run: |
          if [ ! -f /tmp/build.log ]; then
            echo "Build log not found — profiling skipped" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Build profile (per-plugin closeBundle time)"
            echo ""
            echo "| Plugin | Time (s) |"
            echo "|---|---:|"
            grep -E '^\[profile\]' /tmp/build.log \
              | sed -E 's/^\[profile\] +//; s/ +([0-9.]+)s$/|\1/' \
              | awk -F'|' '{printf "| %s | %s |\n", $1, $2}' \
              | sort -t'|' -k3 -nr
            echo ""
            grep -E '^\[profile-total\]' /tmp/build.log | sed 's/^\[profile-total\] /**/' || true
            # Detailed per-plugin wall+CPU table is emitted only when
            # SEQUENTIAL_PROFILE was set (workflow_dispatch input). Parallel
            # closeBundle execution makes wall-clock unreliable as a "who is
            # slow" signal — see profilePlugin.ts. The detail section uses
            # the [profile-detail] marker emitted alongside the original
            # [profile] line, so it's only present on opt-in profiling runs.
            if grep -qE '^\[profile-detail\]' /tmp/build.log; then
              echo ""
              echo "## Build profile — sequential, per-plugin wall + CPU"
              echo ""
              echo "| Plugin | Wall (s) | CPU (s) |"
              echo "|---|---:|---:|"
              # [profile-detail] <name padded> wall_s=N.NN cpu_s=N.NN
              grep -E '^\[profile-detail\]' /tmp/build.log \
                | sed -E 's/^\[profile-detail\] +//' \
                | awk '{
                    name=""; for(i=1;i<=NF-2;i++) name = name (i>1?" ":"") $i;
                    wall=$(NF-1); cpu=$NF;
                    sub(/wall_s=/, "", wall); sub(/cpu_s=/, "", cpu);
                    printf "| %s | %s | %s |\n", name, wall, cpu
                  }' \
                | sort -t'|' -k3 -nr
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: SPA fallback (GitHub Pages serves 404.html for unknown paths)
        run: cp dist/index.html dist/404.html

      - name: Capture pre-deploy sitemap URLs (for IndexNow diff)
        if: github.event.inputs.profile_sequential != 'true'
        continue-on-error: true
        run: node scripts/capture-deployed-sitemaps.mjs

      - name: Merge previous CSS/JS assets for Clarity recordings
        # Runs as the LAST mutation of dist/ before upload, on purpose.
        # Earlier in the pipeline this step ran right after the build, but
        # that meant every downstream audit/walker (Audit SPA bundle,
        # write-collisions analysis, the parallel post-build pool) ran on
        # a dist/ that contained both fresh hashed bundles AND old hashed
        # bundles merged from the previous deploy's Clarity cache. Audits
        # were forced to whitelist the older filename patterns, and any
        # future audit that touches dist/assets/ has to repeat that
        # whitelisting. Moving the merge here keeps `dist/` byte-identical
        # to this build's output through every gate, then injects the
        # Clarity preservation overlay only into the artifact bytes that
        # actually ship to GitHub Pages.
        # The --snapshot pass updates .clarity-asset-cache/ with whatever
        # is in dist/assets/ at this point (= fresh build + merged old
        # generations), so the next run starts from a complete picture.
        continue-on-error: true
        run: |
          node scripts/preserve-clarity-assets.mjs --merge
          node scripts/preserve-clarity-assets.mjs --snapshot

      - name: Upload artifact for GitHub Pages
        # PATH 3 (tar in bg during post-build pool) was tried in commit
        # 11b65de81 and reverted: tar reading 6.4 GB of dist/ contended
        # with the 4 heaviest audits (page-weight, h1-title-duplicates,
        # text-html-ratio, title-length) which also walk dist/. Net
        # post-build wall went 230s → 328s (+98s), exceeding the 38s
        # saved on upload. Back to standard sequential upload.
        if: github.event.inputs.profile_sequential != 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Upload dist HTML + sitemaps for post-deploy validation
        if: github.event.inputs.profile_sequential != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist-html-${{ github.run_id }}
          path: |
            dist/**/*.html
            dist/sitemap*.xml
            dist/.write-collisions.json
            dist/.write-collisions-data/
          retention-days: 7
          include-hidden-files: true
          if-no-files-found: warn

      - name: Upload previous-slug winners for post-deploy validation
        if: github.event.inputs.profile_sequential != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: winners-${{ github.run_id }}
          path: data/previous-slug-winners.json
          retention-days: 7
          if-no-files-found: ignore

      # GitHub Pages allows only one deployment at a time. When concurrent
      # pushes trigger this workflow, the second run can hit "in progress
      # deployment" errors. Retry once after a short wait to handle this.
      - name: Deploy to GitHub Pages
        if: github.event.inputs.profile_sequential != 'true'
        id: deployment_first
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait for previous Pages deployment to finish
        if: github.event.inputs.profile_sequential != 'true' && steps.deployment_first.outcome == 'failure'
        run: |
          echo "::warning::First deploy attempt failed (likely Pages busy). Retrying in 30s..."
          sleep 30

      - name: Deploy to GitHub Pages (retry)
        id: deployment
        if: github.event.inputs.profile_sequential != 'true' && steps.deployment_first.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Fail if both deploy attempts failed
        if: github.event.inputs.profile_sequential != 'true' && steps.deployment_first.outcome == 'failure' && steps.deployment.outcome != 'success'
        run: exit 1

      - name: Save deploy metadata to Firestore
        if: success() && github.event.inputs.profile_sequential != 'true'
        env:
          ARTICLE_ID: ${{ github.event.inputs.article_id }}
          ARTICLE_URL: ${{ github.event.inputs.article_url }}
          OG_TITLE: ${{ github.event.inputs.og_title }}
          OG_DESCRIPTION: ${{ github.event.inputs.og_description }}
          OG_IMAGE: ${{ github.event.inputs.og_image }}
          ARTICLE_CATEGORY: ${{ github.event.inputs.article_category }}
        run: |
          node scripts/deploy-registry.mjs save \
            --run-id="${{ github.run_id }}" \
            --sha="${{ github.sha }}" \
            --trigger="${{ github.event_name }}" \
            --article-id="${ARTICLE_ID}" \
            --article-url="${ARTICLE_URL}" \
            --og-title="${OG_TITLE}" \
            --og-description="${OG_DESCRIPTION}" \
            --og-image="${OG_IMAGE}" \
            --article-category="${ARTICLE_CATEGORY}"

      - name: Report failure to Linear
        if: failure()
        continue-on-error: true
        run: |
          node scripts/lib/linear-issue-creator.mjs \
            --title "CI Failure: ${{ github.workflow }} — run ${{ github.run_number }}" \
            --description "## Deploy fallito
          **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** ${{ github.ref_name }}
          **Trigger:** ${{ github.event_name }}" \
            --priority 1 \
            --label Bug \
            --workflow "${{ github.workflow }}"
