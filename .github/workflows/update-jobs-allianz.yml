name: Update Allianz Suisse Jobs (Dedicated)

on:
  workflow_dispatch:
    inputs:
      strict_localization:
        description: 'Fail if any Allianz locale is missing/untranslated (1=yes, 0=no)'
        required: false
        default: '1'
        type: string
      timeout_ms:
        description: 'Optional request timeout in ms (4000-20000)'
        required: false
        type: string

concurrency:
  group: jobs-crawler-allianz
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-allianz-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 50

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase credentials (optional)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          else
            echo "ℹ️ Firebase secrets not set — crawler will use file config only."
            exit 0
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Load secrets from Remote Config
        run: node scripts/load-rc-env.mjs

      - name: Run dedicated Allianz Suisse crawler
        env:
          JOBS_CRAWLER_TIMEOUT_MS: ${{ github.event.inputs.timeout_ms || '' }}
          JOBS_CRAWLER_USE_FIRESTORE_CONFIG: '1'
          JOBS_ALLIANZ_STRICT: ${{ github.event.inputs.strict_localization || '1' }}
        run: npm run jobs:update:allianz

      - name: Housekeeping — remove expired job listings (scoped)
        env:
          JOBS_HOUSEKEEPING_SCOPE: 'allianz-suisse'
        run: node scripts/cleanup-jobs.mjs
        continue-on-error: true

      - name: Commit and push
        run: bash scripts/lib/git-commit-data.sh "🏗️ Auto-update Allianz Suisse jobs (dedicated crawler)"
