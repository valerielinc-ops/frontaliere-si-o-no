name: Cleanup Stale Job Listings (Manual Only)

# Cron disabled — housekeeping is now Phase 1 of the translate-pending pipeline.
# Keep this workflow for manual emergency cleanup via workflow_dispatch.
on:
  # schedule:
  #   - cron: '0 6 * * *'  # DISABLED: now part of translate-pending.yml Phase 1
  workflow_dispatch:
    inputs:
      stale_days:
        description: 'Remove jobs older than N days (default: 60)'
        required: false
        type: string
      concurrency:
        description: 'Max concurrent URL checks (1-20, default: 5)'
        required: false
        type: string
      timeout_ms:
        description: 'URL check timeout in ms (2000-15000, default: 5000)'
        required: false
        type: string

concurrency:
  group: jobs-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_OPTIONS: '--disable-warning=DEP0040 --disable-warning=DEP0169'

jobs:
  cleanup-stale-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 50

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cleanup each per-crawler slice
        env:
          JOBS_STALE_DAYS: ${{ github.event.inputs.stale_days || '' }}
          JOBS_HOUSEKEEPING_CONCURRENCY: ${{ github.event.inputs.concurrency || '' }}
          JOBS_HOUSEKEEPING_TIMEOUT_MS: ${{ github.event.inputs.timeout_ms || '' }}
        run: |
          # Iterate over all per-crawler slice files and clean each one
          for slice in data/jobs/by-crawler/*.json; do
            [ -f "$slice" ] || continue
            echo "──── Cleaning: $slice ────"
            JOBS_SLICE_FILE="$slice" node scripts/cleanup-jobs.mjs || true
          done
          echo "✅ Per-slice cleanup complete"

      - name: Commit and push
        id: changes
        run: bash scripts/lib/git-commit-data.sh --slice-only "🧹 Daily cleanup — remove expired job listings"
