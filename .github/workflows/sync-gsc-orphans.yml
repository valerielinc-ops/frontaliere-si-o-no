name: Sync GSC Orphan Job Slugs

# Runs twice a week to keep orphan data synchronized with Google Search Console.
# Also triggered after translate-pending completes (new jobs may create new orphans).
on:
  schedule:
    - cron: '30 14 * * 0'  # Sunday at 14:30 UTC
    - cron: '30 14 * * 3'  # Wednesday at 14:30 UTC
  workflow_run:
    workflows: ['Translate Pending Jobs']
    types: [completed]
  workflow_dispatch:
    inputs:
      enable_url_inspection:
        description: 'Enable URL Inspection API (500 req cap, uses daily quota)'
        required: false
        type: boolean
        default: false
      enable_wayback:
        description: 'Enable Wayback Machine lookups (slow, unreliable)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (no file writes, just report)'
        required: false
        type: boolean
        default: false

concurrency:
  group: jobs-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-orphans:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          else
            echo "ℹ️ Firebase secrets not set — will use file config only."
            exit 0
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Load RC secrets
        run: node scripts/load-rc-env.mjs

      - name: Sync GSC orphan slugs + enrich
        run: |
          node scripts/sync-gsc-orphans.mjs \
            ${{ inputs.dry_run == true && '--dry-run' || '' }}
        env:
          ENABLE_URL_INSPECTION: ${{ inputs.enable_url_inspection == true && '1' || '0' }}
          ENABLE_WAYBACK: ${{ inputs.enable_wayback == true && '1' || '0' }}

      - name: Assemble jobs dataset (needed by reconcile)
        if: ${{ inputs.dry_run != true }}
        run: node scripts/assemble-jobs-dataset.mjs

      - name: Reconcile orphan + expired slugs with active jobs
        if: ${{ inputs.dry_run != true }}
        run: node scripts/reconcile-job-slugs.mjs

      - name: Mine all job slugs for comprehensive coverage
        if: ${{ inputs.dry_run != true }}
        run: node scripts/mine-all-job-slugs.mjs

      - name: Commit and push
        if: ${{ inputs.dry_run != true }}
        id: commit
        run: |
          SKIP_AI_TRANSLATION=1 bash scripts/lib/git-commit-data.sh --slice-only \
            "chore: sync GSC orphan slugs and reconcile job data" \
            data/orphan-enriched-data.json \
            data/orphan-indexed-job-slugs.json \
            data/gsc-orphan-queries.json \
            data/url-inspection-results.json \
            data/all-known-job-slugs.json \
            data/seo-404-compat-paths.json
        env:
          SKIP_AI_TRANSLATION: '1'

      - name: Trigger deploy if data changed
        if: steps.commit.outputs.has_changes == 'true' && inputs.dry_run != true
        run: |
          # Check if tracking or compat data changed (new soft-landing pages needed)
          TRACKING_CHANGES=$(git diff HEAD~1 --name-only -- data/all-known-job-slugs.json data/seo-404-compat-paths.json | wc -l)
          CRAWLER_CHANGES=$(git diff HEAD~1 --name-only -- data/jobs/by-crawler/ | wc -l)
          ORPHAN_CHANGES=$(git diff HEAD~1 --name-only -- data/orphan-enriched-data.json | wc -l)

          if [ "$CRAWLER_CHANGES" -gt 0 ] || [ "$TRACKING_CHANGES" -gt 0 ]; then
            echo "🚀 Job data changed (crawler: $CRAWLER_CHANGES, tracking: $TRACKING_CHANGES) — triggering deploy"
            bash scripts/lib/trigger-deploy.sh
          elif [ "$ORPHAN_CHANGES" -gt 0 ]; then
            echo "📝 Only orphan enrichment metadata changed — deploy not strictly needed"
            echo "   (soft-landing pages will use enriched data on next regular deploy)"
          else
            echo "📭 No meaningful data changes — skipping deploy"
          fi
        env:
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
