name: Monitor GSC Job Indexation

on:
  schedule:
    # Weekly: Sunday 15:00 UTC (after sync-gsc-orphans)
    - cron: '0 15 * * 0'
  workflow_dispatch: {}

concurrency:
  group: monitor-gsc-seo
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Write Service Account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          else
            echo "⚠️ No Firebase SA credentials — monitor will skip GSC checks"
          fi

      - name: Load secrets from Remote Config
        continue-on-error: true
        run: node scripts/load-rc-env.mjs

      - name: Run GSC Job Indexation Monitor
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: node scripts/monitor-gsc-job-indexation.mjs

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/firebase-sa.json
