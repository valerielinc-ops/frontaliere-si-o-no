name: Update Tinext Jobs (Dedicated)

on:
  # No schedule — Tinext is dispatched by orchestrate-crawlers.yml.
  # A previous cron at 09:15 UTC caused a post-translate run (FRO pipeline bug).
  workflow_dispatch:
    inputs:
      strict_localization:
        description: 'Fail if any Tinext locale is missing/untranslated (1=yes, 0=no)'
        required: false
        default: '1'
        type: string
      timeout_ms:
        description: 'Optional request timeout in ms (4000-20000)'
        required: false
        type: string
      skip_ai_translation:
        description: "Skip AI translation (1=yes, cache only)"
        required: false
        default: "0"
        type: string

concurrency:
  group: jobs-crawler-tinext
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-tinext-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 50

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase credentials (optional)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          else
            echo "ℹ️ Firebase secrets not set — crawler will use file config only."
            exit 0
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Load secrets from Remote Config
        run: node scripts/load-rc-env.mjs

      - name: Run dedicated Tinext crawler
        env:
          JOBS_CRAWLER_TIMEOUT_MS: ${{ github.event.inputs.timeout_ms || '' }}
          JOBS_CRAWLER_USE_FIRESTORE_CONFIG: '1'
          JOBS_TINEXT_STRICT: ${{ github.event.inputs.strict_localization || '1' }}
          CRAWLER_SLICE_ONLY: '1'
          SKIP_AI_TRANSLATION: ${{ github.event.inputs.skip_ai_translation || '0' }}
        run: npm run jobs:update:tinext

      - name: Housekeeping — remove expired job listings (scoped)
        env:
          JOBS_HOUSEKEEPING_SCOPE: 'tinext'
          JOBS_SLICE_FILE: 'data/jobs/by-crawler/tinext.json'
        run: node scripts/cleanup-jobs.mjs
        continue-on-error: true

      - name: Commit and push
        id: changes
        env:
          SKIP_AI_TRANSLATION: ${{ github.event.inputs.skip_ai_translation || '0' }}
        run: bash scripts/lib/git-commit-data.sh --slice-only "🧩 Auto-update Tinext jobs (dedicated crawler)" data/jobs-crawler-adapters/

      - name: Report failure to Linear
        if: failure()
        continue-on-error: true
        run: |
          node scripts/lib/linear-issue-creator.mjs \
            --title "Crawler Failure: ${{ github.workflow }}" \
            --description "## Crawler fallito
          **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** ${{ github.ref_name }}
          **Trigger:** ${{ github.event_name }}" \
            --priority 2 \
            --label Bug \
            --workflow "${{ github.workflow }}"
