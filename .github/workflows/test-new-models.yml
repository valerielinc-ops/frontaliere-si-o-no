name: Test New AI Models
on:
  workflow_dispatch:

env:
  NODE_OPTIONS: '--disable-warning=DEP0040 --disable-warning=DEP0169'

jobs:
  test-models:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare Firebase credentials
        run: echo '${{ secrets.FIREBASE_SA_KEY }}' > /tmp/sa-key.json
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}

      - name: Load secrets from Remote Config
        run: GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json node scripts/load-rc-env.mjs

      - name: Test new models
        run: |
          node -e "
          const { callLLM, AI_MODELS, markExhausted } = await import('./scripts/lib/ai-models.mjs');

          const modelsToTest = [
            { name: 'CF_GEMMA_4_26B', id: AI_MODELS.CF_GEMMA_4_26B },
            { name: 'CF_KIMI_K2_5', id: AI_MODELS.CF_KIMI_K2_5 },
            { name: 'CF_NV_NEMOTRON_120B', id: AI_MODELS.CF_NV_NEMOTRON_120B },
            { name: 'CF_GRANITE_4_MICRO', id: AI_MODELS.CF_GRANITE_4_MICRO },
            { name: 'CB_QWEN3_235B', id: AI_MODELS.CB_QWEN3_235B },
            { name: 'CB_GLM_47', id: AI_MODELS.CB_GLM_47 },
          ];

          const prompt = 'Translate to German. Output ONLY the translation, nothing else: Offerta di lavoro come ingegnere software a Lugano, Svizzera. Contratto a tempo indeterminato con salario competitivo.';

          for (const m of modelsToTest) {
            console.log('---');
            console.log('Testing:', m.name, '(' + m.id + ')');
            try {
              const result = await callLLM(prompt, {
                chain: [m.id],
                maxTokens: 200,
                temperature: 0.3,
              });
              console.log('✅ SUCCESS');
              console.log('Model used:', result.model);
              console.log('Output:', result.text.slice(0, 200));
            } catch (err) {
              console.log('❌ FAILED:', err.message);
            }
          }
          console.log('--- DONE ---');
          "
