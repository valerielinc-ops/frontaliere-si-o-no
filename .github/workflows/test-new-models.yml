name: Test New AI Models
on:
  workflow_dispatch:

env:
  NODE_OPTIONS: '--disable-warning=DEP0040 --disable-warning=DEP0169'

jobs:
  test-models:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase credentials (optional)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          else
            echo "ℹ️ Firebase secrets not set — cannot test models."
            exit 1
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Load secrets from Remote Config
        run: node scripts/load-rc-env.mjs

      - name: Test new models
        run: |
          node -e "
          const { callLLM, AI_MODELS } = await import('./scripts/lib/ai-models.mjs');

          const modelsToTest = [
            { name: 'CF_GEMMA_4_26B', id: AI_MODELS.CF_GEMMA_4_26B },
            { name: 'CF_KIMI_K2_5', id: AI_MODELS.CF_KIMI_K2_5 },
            { name: 'CF_NV_NEMOTRON_120B', id: AI_MODELS.CF_NV_NEMOTRON_120B },
            { name: 'CF_GRANITE_4_MICRO', id: AI_MODELS.CF_GRANITE_4_MICRO },
            { name: 'CB_QWEN3_235B', id: AI_MODELS.CB_QWEN3_235B },
            { name: 'CB_GLM_47', id: AI_MODELS.CB_GLM_47 },
          ];

          const messages = [{ role: 'user', content: 'Translate to German. Output ONLY the translation, nothing else: Offerta di lavoro come ingegnere software a Lugano, Svizzera. Contratto a tempo indeterminato con salario competitivo.' }];

          let passed = 0, failed = 0;
          for (const m of modelsToTest) {
            console.log('');
            console.log('========================================');
            console.log('Testing:', m.name, '(' + m.id + ')');
            console.log('========================================');
            try {
              const result = await callLLM(messages, {
                chain: [m.id],
                maxTokens: 200,
                temperature: 0.3,
              });
              console.log('✅ SUCCESS — model:', result.model);
              console.log('   Output:', result.text.slice(0, 300));
              passed++;
            } catch (err) {
              console.log('❌ FAILED:', err.message.slice(0, 500));
              failed++;
            }
          }
          console.log('');
          console.log('========================================');
          console.log('RESULTS:', passed, 'passed,', failed, 'failed out of', modelsToTest.length);
          console.log('========================================');
          if (failed > 0) process.exit(1);
          "
