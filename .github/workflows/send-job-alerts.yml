name: Send Job Alert Emails

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

concurrency:
  group: job-alerts
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON secret is not set"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Load secrets from Remote Config
        run: node scripts/load-rc-env.mjs

      - name: Send job alert emails
        continue-on-error: true
        id: send-alerts
        env:
          ENABLE_JOB_ALERTS: 'true'
        run: node scripts/send-job-alerts.mjs

      - name: Report failure to Linear
        if: steps.send-alerts.outcome == 'failure'
        continue-on-error: true
        run: |
          node scripts/lib/linear-issue-creator.mjs \
            --title "CI Failure: ${{ github.workflow }} — run ${{ github.run_number }}" \
            --description "## Job Alerts invio fallito
          **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** ${{ github.ref_name }}
          **Trigger:** ${{ github.event_name }}" \
            --priority 2 \
            --label Bug \
            --workflow "${{ github.workflow }}"
