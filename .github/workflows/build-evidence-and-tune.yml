name: Build evidence + tune quota
on:
  schedule:
    - cron: '0 4 * * *'  # daily 04:00 UTC
  workflow_dispatch:

# tune-quota job comes in Phase 4 — for now only build-evidence runs.
jobs:
  build-evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Prepare Firebase service-account credentials
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Load secrets from Remote Config
        run: node scripts/load-rc-env.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Build evidence index
        run: node scripts/build-evidence-index.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}

      - name: Build article embeddings (incremental)
        run: node scripts/build-article-embeddings.mjs --incremental
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit evidence
        run: |
          git config user.name "evidence-bot"
          git config user.email "evidence-bot@frontaliereticino.ch"
          git add data/evidence-index.json data/article-embeddings.bin data/article-embeddings-meta.json
          if git diff --cached --quiet; then
            echo "No evidence changes to commit"
          else
            git commit -m "chore(evidence): refresh $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          fi
