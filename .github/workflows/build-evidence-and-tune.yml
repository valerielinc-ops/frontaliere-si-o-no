name: Build evidence + tune quota
on:
  schedule:
    - cron: '0 4 * * *'  # daily 04:00 UTC
  workflow_dispatch:

jobs:
  build-evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Prepare Firebase service-account credentials
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Load secrets from Remote Config
        run: node scripts/load-rc-env.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      # Env for build-evidence-index.mjs (GA4_PROPERTY_ID, POSTHOG_*) +
      # build-article-embeddings.mjs (OPENAI_API_KEY) is populated via
      # load-rc-env.mjs above, which writes RC keys to $GITHUB_ENV.
      # No explicit `env:` here — that would shadow RC values with empty
      # GitHub secret references. FIREBASE_SERVICE_ACCOUNT_JSON also
      # already in env via the first step.
      - name: Build evidence index
        run: node scripts/build-evidence-index.mjs

      - name: Build article embeddings (incremental)
        run: node scripts/build-article-embeddings.mjs --incremental

      - name: Commit evidence
        run: |
          git config user.name "evidence-bot"
          git config user.email "evidence-bot@frontaliereticino.ch"
          # Stage whichever evidence artifacts exist (embeddings.bin missing
          # if OPENAI_API_KEY is unset; meta JSON is always written).
          for f in data/evidence-index.json data/article-embeddings.bin data/article-embeddings-meta.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          git pull --rebase --autostash origin main
          if git diff --cached --quiet; then
            echo "No evidence changes to commit"
          else
            git commit -m "chore(evidence): refresh $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          fi

  tune-quota:
    needs: build-evidence
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Pull latest evidence commit from build-evidence job
        run: git pull --rebase --autostash origin main

      - name: Tune discovery quota
        run: node scripts/tune-discovery-quota.mjs

      - name: Commit tune state
        run: |
          git config user.name "tune-bot"
          git config user.email "tune-bot@frontaliereticino.ch"
          git add data/quota-state.json data/quota-history.jsonl 2>/dev/null || true
          git pull --rebase --autostash origin main
          if git diff --cached --quiet; then
            echo "No tune changes to commit"
          else
            git commit -m "chore(tune): quota update $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          fi
