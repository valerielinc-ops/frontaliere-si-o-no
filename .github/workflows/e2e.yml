name: E2E Tests
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build:ci
        env:
          CI: 'true'
      - name: E2E smoke (content + link graph + visual UI)
        run: npm run test:e2e:smoke
      # Visual regression baselines are OS-sensitive (darwin vs linux pixel
      # diffs). We run them only when a linux-specific baseline has been
      # committed. Generate with: `npm run test:e2e:visual:update` on Linux
      # (or inside a linux container) and commit the PNGs.
      - name: E2E visual regression (if linux baselines present)
        if: hashFiles('tests/e2e/seo-visual-regression.spec.ts-snapshots/*-linux.png') != ''
        run: npm run test:e2e:visual
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: test-results/
          retention-days: 14
