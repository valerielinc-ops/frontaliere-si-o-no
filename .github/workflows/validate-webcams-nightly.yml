name: Validate border-wait webcam URLs

on:
  schedule:
    # 04:15 UTC = 05:15/06:15 CET, after most overnight traffic has settled
    - cron: '15 4 * * *'
  workflow_dispatch: {}

concurrency:
  group: validate-webcams-nightly
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate webcam URLs
        id: validate
        run: |
          set +e
          node scripts/validate-webcam-urls.mjs | tee /tmp/webcam-report.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open issue on failure
        if: steps.validate.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/webcam-report.txt', 'utf-8').slice(0, 5000);
            const title = `Border-wait webcam URLs degraded — ${new Date().toISOString().slice(0,10)}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Nightly webcam health check reported failures.\n\n\`\`\`\n${report}\n\`\`\`\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['border-wait', 'webcam', 'maintenance'],
            });
