name: Submit IndexNow Batch

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'Target engine (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - bing
          - yandex
          - indexnow
      sitemap:
        description: 'Sitemap filter (e.g. "jobs", "blog", leave empty for all)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (preview only, no submissions)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build to generate full sitemaps
        run: npx vite build --logLevel warn
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Submit IndexNow batch
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.endpoint }}" ]; then
            ARGS="$ARGS --endpoint ${{ inputs.endpoint }}"
          fi
          if [ -n "${{ inputs.sitemap }}" ]; then
            ARGS="$ARGS --sitemap ${{ inputs.sitemap }}"
          fi
          node scripts/submit-indexnow-batch.mjs $ARGS
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
