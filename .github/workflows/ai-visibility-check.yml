name: AI Visibility Check

on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of every month at 08:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — list queries without making API calls'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write
  issues: write

concurrency:
  group: ai-visibility-check
  cancel-in-progress: false

jobs:
  check-visibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      - name: Load secrets from Remote Config
        run: node scripts/load-rc-env.mjs

      - name: Run AI visibility check
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/check-ai-visibility.mjs --dry-run
          else
            node scripts/check-ai-visibility.mjs --verbose
          fi

      - name: Upload report artifacts
        if: always() && inputs.dry_run != 'true'
        uses: actions/upload-artifact@v5
        with:
          name: ai-visibility-${{ github.run_number }}
          path: reports/ai-visibility-*
          retention-days: 365

      - name: Commit reports
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ai-visibility-*.json reports/ai-visibility-latest.md
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "📊 AI visibility report — ${DATE}"
          # Centralized rebase-retry helper survives concurrent pushes.
          # AI visibility reports are timestamped append-only files plus a
          # single latest.md; on rebase conflict re-stage the artifacts we
          # already produced on top of the new base.
          bash scripts/lib/git-push-with-retry.sh \
            --branch "$GITHUB_REF_NAME" \
            --regenerate-cmd "git add reports/ai-visibility-*.json reports/ai-visibility-latest.md"

      - name: Create GitHub issue if citations dropped
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT="reports/ai-visibility-latest.md"
          if [ ! -f "$REPORT" ]; then
            echo "No report generated, skipping issue creation."
            exit 0
          fi

          # Extract score from JSON report
          DATE=$(date -u +%Y-%m-%d)
          JSON_REPORT="reports/ai-visibility-${DATE}.json"
          if [ ! -f "$JSON_REPORT" ]; then
            echo "No JSON report found, skipping issue creation."
            exit 0
          fi

          SCORE=$(node -e "const r=JSON.parse(require('fs').readFileSync('${JSON_REPORT}','utf8')); console.log(r.meta.score)")
          TOTAL=$(node -e "const r=JSON.parse(require('fs').readFileSync('${JSON_REPORT}','utf8')); console.log(r.meta.scoreMax)")
          PERCENT=$(node -e "const r=JSON.parse(require('fs').readFileSync('${JSON_REPORT}','utf8')); console.log(r.meta.scorePercent)")

          # Check for trend data (previous score)
          PREV_SCORE=$(node -e "const r=JSON.parse(require('fs').readFileSync('${JSON_REPORT}','utf8')); console.log(r.trend?.previousScore ?? 'none')" 2>/dev/null || echo "none")

          CREATE_ISSUE=false
          ISSUE_TITLE="📊 AI Visibility Report — ${DATE}: ${SCORE}/${TOTAL} (${PERCENT}%)"
          ISSUE_LABELS="seo,ai-visibility"

          # Always create an issue for the monthly report
          CREATE_ISSUE=true

          # Add urgency label if citations dropped
          if [ "$PREV_SCORE" != "none" ] && [ "$SCORE" -lt "$PREV_SCORE" ]; then
            LOST=$((PREV_SCORE - SCORE))
            ISSUE_TITLE="⚠️ AI Visibility Dropped — ${DATE}: ${SCORE}/${TOTAL} (lost ${LOST} citations)"
            ISSUE_LABELS="seo,ai-visibility,priority"
          fi

          if [ "$CREATE_ISSUE" = "true" ]; then
            BODY=$(cat "$REPORT")
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body "$BODY" \
              --label "$ISSUE_LABELS" || echo "⚠ Failed to create issue (labels may not exist yet)"
          fi
