name: FB Jobs Daily Schedule (E5)

on:
  schedule:
    # 13:30 UTC = 14:30 CET / 15:30 CEST. Chosen to land AFTER the daily
    # orchestrator-→translate pipeline that primes today's job set:
    #   - orchestrate-crawlers (08:00 UTC, ~103 min) ends ~09:43 UTC
    #   - translate-pending  (12:00 UTC, up to ~56 min) ends ~12:56 UTC
    # 13:30 leaves a ~30 min cushion. The 144 scheduled FB posts start at
    # the next :05 mark (≥ +10 min FB minimum) and fan out over the next
    # 24 h on minute slots :05/:15/:25/:35/:45/:55.
    - cron: '30 13 * * *'
  workflow_dispatch:
    inputs:
      volume:
        description: 'Posts to schedule (1=smoke-test, 24/72/144 = 1/h, 1/20m, 1/10m)'
        required: false
        default: '144'
        type: choice
        options: ['1', '24', '72', '144']
      dry_run:
        description: 'Skip Graph API call (preview only)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write  # to commit fb-posted-jobs.json

jobs:
  schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Load secrets from RC
        run: node scripts/load-rc-env.mjs

      - name: Assemble jobs dataset
        run: node scripts/assemble-jobs-dataset.mjs --stats

      - name: Schedule FB jobs
        env:
          FB_JOB_VOLUME: ${{ github.event.inputs.volume || '24' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/schedule-fb-jobs-daily.mjs

      - name: Commit posted-jobs tracking
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          if git diff --quiet data/fb-posted-jobs.json; then
            echo "no changes"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fb-posted-jobs.json
          git commit -m "chore(fb): track posted jobs [skip ci]"
          bash scripts/lib/git-push-with-retry.sh
