name: Update Switzerland Unemployment Rate

on:
  schedule:
    - cron: '45 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Update unemployment dataset
        run: node scripts/update-switzerland-unemployment-rate.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- public/data/switzerland-unemployment-rate.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes in unemployment dataset."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📊 Unemployment data updated"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data/switzerland-unemployment-rate.json
          git commit -m "chore(data): sync Switzerland unemployment rate (SECO)"

          # Centralized rebase-retry helper survives concurrent pushes from
          # other data-refresh workflows. On rebase conflict, re-fetch the
          # SECO dataset on top of the new base.
          bash scripts/lib/git-push-with-retry.sh \
            --regenerate-cmd "node scripts/update-switzerland-unemployment-rate.mjs && git add public/data/switzerland-unemployment-rate.json"

          # GITHUB_TOKEN pushes don't trigger other workflows — trigger deploy manually
          bash scripts/lib/trigger-deploy.sh || true

