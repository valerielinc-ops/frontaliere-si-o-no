name: crawler-health-monitor

# Daily check that every crawler in `data/jobs/by-crawler/` produced fresh,
# non-empty output. Opens one GitHub issue per stale/broken crawler.
# Runs after most crawlers complete (cron varies by source, ~05:00-06:00 UTC).
#
# State persistence: `data/crawler-health.json` is committed back to main
# after the script runs so `consecutiveEmptyRuns` and `lastSuccessfulRunAt`
# accumulate across daily runs. Without this commit-back the empty-streak
# gate is dead code (every run starts from `crawlers: {}`).

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: crawler-health-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          # Need full history so rebase-on-push can replay against latest main.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN; the `contents: write` permission above
          # is enough to push back to `main` from this workflow.
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No `npm ci` — the script uses only the Node stdlib.
      # If a future version needs deps, switch to `npm ci --omit=dev`.

      - name: Run health check
        id: health
        continue-on-error: true
        run: node scripts/check-crawler-health.mjs

      - name: Commit updated health state
        # Always try to persist state, even when the check itself flagged
        # issues — the `consecutiveEmptyRuns` counter needs the commit to
        # keep climbing toward the 3-empty-runs broken gate.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! git diff --quiet -- data/crawler-health.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/crawler-health.json

            MAX_ATTEMPTS=5
            attempt=0
            while true; do
              attempt=$((attempt + 1))
              # Commit once (the diff is already in the index).
              if git diff --cached --quiet; then
                echo "ℹ️ No staged changes left — already up to date."
                break
              fi
              git commit -m "chore: update crawler-health state [skip ci]" || true

              # Fetch + rebase onto the latest remote tip. Other crawler
              # workflows push to main concurrently; we only touch
              # data/crawler-health.json so conflicts are extremely rare,
              # but rebase keeps us safe even when a parallel push lands
              # between our fetch and push.
              git fetch origin main
              if ! git rebase origin/main; then
                echo "⚠️ Rebase conflict — aborting and resetting."
                git rebase --abort 2>/dev/null || true
                if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
                  echo "❌ Could not rebase after $MAX_ATTEMPTS attempts."
                  exit 1
                fi
                # Reset our commit, re-add the file (latest remote may have
                # touched it), then loop.
                git reset --mixed HEAD~1 || true
                git fetch origin main
                git reset --hard origin/main
                # Re-run the script so the state file reflects the new
                # remote baseline plus today's observations.
                node scripts/check-crawler-health.mjs || true
                if git diff --quiet -- data/crawler-health.json; then
                  echo "ℹ️ State file already matches remote after replay."
                  break
                fi
                git add data/crawler-health.json
                continue
              fi

              if git push origin main; then
                echo "✅ Pushed updated health state."
                break
              fi

              echo "⚠️ Push rejected (attempt $attempt/$MAX_ATTEMPTS) — retrying after backoff..."
              if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
                echo "❌ Push failed after $MAX_ATTEMPTS attempts."
                exit 1
              fi
              # Undo our commit so the next loop re-fetches cleanly.
              git reset --mixed HEAD~1 || true
              sleep $((attempt * 5 + RANDOM % 6))
            done
          else
            echo "ℹ️ No state change — nothing to commit."
          fi

      - name: Open issues for stale crawlers
        if: steps.health.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ ! -f data/crawler-health-issues.json ]; then
            echo "Health check failed but no issues file emitted; nothing to open."
            exit 1
          fi

          # Build a deduplicated list of titles already open. The
          # `crawler-health` repo label is not created by this workflow
          # (creating labels needs a separate gh call that can race with
          # this one), so dedup is by exact title match instead.
          existing=$(gh issue list --state open \
            --limit 500 --json title --jq '.[].title' || true)

          count=$(jq 'length' data/crawler-health-issues.json)
          echo "Found $count stale crawler(s)."

          for i in $(seq 0 $((count - 1))); do
            slug=$(jq -r ".[$i].slug" data/crawler-health-issues.json)
            reason=$(jq -r ".[$i].reason" data/crawler-health-issues.json)
            status=$(jq -r ".[$i].status" data/crawler-health-issues.json)
            lastSeen=$(jq -r ".[$i].lastSeenAt // \"never\"" data/crawler-health-issues.json)
            empties=$(jq -r ".[$i].consecutiveEmptyRuns // 0" data/crawler-health-issues.json)

            title="[crawler-health] ${slug}: ${status}"

            if echo "$existing" | grep -Fxq "$title"; then
              echo "Issue already open for ${slug}; skipping."
              continue
            fi

            body=$(cat <<EOF
          Automated health check flagged crawler **\`${slug}\`** as **${status}**.

          - Reason: ${reason}
          - Last successful run: ${lastSeen}
          - Consecutive empty runs: ${empties}

          Source state: \`data/crawler-health.json\` → \`crawlers["${slug}"]\`
          Detection script: \`scripts/check-crawler-health.mjs\`
          Workflow run: ${GITHUB_SERVER_URL:-https://github.com}/${GH_REPO}/actions/runs/${GITHUB_RUN_ID:-}

          Triage:
          1. Open \`data/jobs/by-crawler/${slug}.json\` and inspect last entries.
          2. Run the crawler locally to reproduce.
          3. If the source HTML changed, patch the parser.
          4. If the source is gone, retire the crawler and remove from the orchestrator.
          EOF
          )

            gh issue create \
              --title "$title" \
              --body "$body" \
              --repo "$GH_REPO" || echo "Failed to create issue for ${slug} (continuing)."
          done

      - name: Fail if any crawler stale
        if: steps.health.outcome == 'failure'
        run: |
          echo "One or more crawlers are stale/broken — see issues created above."
          exit 1
