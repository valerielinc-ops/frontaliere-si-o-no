name: Update Fuel Prices (Italy + Switzerland)

on:
  schedule:
    # Hourly at :37 — write to Firestore only (fresh data, no commit)
    - cron: '37 1-5,7-23 * * *'
    # Daily at 06:37 UTC — write to Firestore AND commit repo cache
    - cron: '37 6 * * *'
  workflow_dispatch: {}

concurrency:
  group: fuel-prices
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      - name: Install firebase-admin
        run: npm install --no-save firebase-admin

      - name: Detect daily run
        id: schedule
        run: |
          if [ "$(date -u +%H)" = "06" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "daily=true" >> "$GITHUB_OUTPUT"
          else
            echo "daily=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate and upload fuel prices to Firestore
        run: |
          if [ "${{ steps.schedule.outputs.daily }}" = "true" ]; then
            node scripts/generate-fuel-prices-dataset.mjs --save-local
          else
            node scripts/generate-fuel-prices-dataset.mjs
          fi

      # Daily: commit repo cache + trigger deploy
      - name: Commit repo cache (daily only)
        id: commit
        if: steps.schedule.outputs.daily == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/fuel-prices.json public/data/fuel-prices.json
          if git diff --cached --quiet; then
            echo "No fuel price changes detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "⛽ Daily fuel prices cache update"
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
            git push origin main
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Load secrets from Remote Config
        if: steps.commit.outputs.has_changes == 'true'
        run: node scripts/load-rc-env.mjs

      - name: Trigger deploy workflow
        if: steps.commit.outputs.has_changes == 'true'
        run: bash scripts/lib/trigger-deploy.sh || true
