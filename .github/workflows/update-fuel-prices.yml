name: Update Fuel Prices (Italy + Switzerland)

on:
  schedule:
    # Every hour at :37 (offset to avoid congestion at :00)
    - cron: '37 * * * *'
  workflow_dispatch: {}

concurrency:
  group: fuel-prices
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Generate fuel prices dataset
        run: node scripts/generate-fuel-prices-dataset.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fuel-prices.json public/data/fuel-prices.json
          if git diff --cached --quiet; then
            echo "ℹ️ No fuel price changes detected."
          else
            git commit -m "⛽ Auto-update fuel prices (Italy + Switzerland)"
            git pull --rebase origin main
            git push origin main
          fi
