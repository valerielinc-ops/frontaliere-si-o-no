name: Seed BFS-depth baseline

# One-shot helper workflow: regenerates `data/bfs-depth-baseline.json`
# against the latest deployed dist/ (downloaded from the most recent
# `github-pages` artifact) and uploads the small JSON output as artifact.
#
# Why this exists
# ---------------
# `audit-bfs-depth.mjs` ships with a placeholder `perSitemap: {}` baseline
# so the gate passes on its first CI run. Once a real production deploy
# produces a fresh dist/, we need a one-shot run to compute actual
# per-sitemap counts and seed the ratchet. After this initial seed, the
# baseline is updated manually via `npm run audit:max-bfs-depth:rebaseline`
# whenever a deploy deliberately lowers an offender count.
#
# Usage
# -----
# 1. Trigger via "Run workflow" in the GitHub UI (workflow_dispatch).
# 2. Download the `bfs-depth-baseline-${{ github.run_id }}` artifact.
# 3. Replace `data/bfs-depth-baseline.json` with the downloaded file,
#    commit, push.

on:
  workflow_dispatch:
    inputs:
      max_depth:
        description: "BFS max depth (depth 0=/, 4=leaf URL)"
        required: false
        default: "4"

permissions:
  contents: read
  actions: read

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Find latest successful deploy
        id: latest
        run: |
          run_id=$(gh run list \
            --workflow=deploy.yml \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "Latest successful deploy: $run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download github-pages artifact from latest deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/gh-pages-artifact dist
          gh run download ${{ steps.latest.outputs.run_id }} \
            --name "github-pages" \
            --dir /tmp/gh-pages-artifact/
          ls -lh /tmp/gh-pages-artifact/

      - name: Extract dist/
        run: |
          tar -xf /tmp/gh-pages-artifact/artifact.tar -C dist
          echo "dist/ tree (top level):"
          ls dist/ | head
          echo ""
          echo "Total HTML files:"
          find dist -name '*.html' | wc -l

      - name: Generate BFS-depth baseline
        run: |
          node scripts/audit-bfs-depth.mjs \
            --max-depth=${{ inputs.max_depth }} \
            --write-baseline=data/bfs-depth-baseline.json
          echo ""
          echo "==== baseline preview ===="
          head -50 data/bfs-depth-baseline.json

      - name: Upload baseline JSON
        uses: actions/upload-artifact@v7
        with:
          name: bfs-depth-baseline-${{ github.run_id }}
          path: data/bfs-depth-baseline.json
          retention-days: 14
          if-no-files-found: error

      - name: Echo download instructions
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "Baseline generated. Next steps:"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "1. Download the artifact:"
          echo "   gh run download ${{ github.run_id }} \\"
          echo "     --name bfs-depth-baseline-${{ github.run_id }} \\"
          echo "     --dir /tmp/"
          echo ""
          echo "2. Replace and commit:"
          echo "   cp /tmp/bfs-depth-baseline.json data/bfs-depth-baseline.json"
          echo "   git add data/bfs-depth-baseline.json"
          echo "   git commit -m \"chore(seo-gate): seed bfs-depth baseline from prod dist\""
          echo "   git push"
          echo ""
          echo "════════════════════════════════════════════════════════════════"
