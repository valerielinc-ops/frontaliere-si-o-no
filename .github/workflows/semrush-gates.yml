name: Semrush Gates

# Blocking SEO/reliability gates aligned to Semrush Site Audit findings:
#   - hreflang correctness (audit:hreflang)
#   - JobPosting structured data (validate:jobposting-schema)
#   - title uniqueness per locale (audit:title-uniqueness)
#   - duplicate body content (audit:content-duplicates)
#   - page weight + <img> dims (audit:page-weight)
#
# The job builds dist/ once and runs every audit against the same artifact.
# A failure here must block merge and deploy.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: semrush-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semrush-dist-gates:
    name: Semrush dist gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Assemble jobs dataset (CI stats)
        run: npm run jobs:assemble:stats
        env:
          CI: 'true'

      - name: Build dist (full, all plugins enabled)
        run: npm run build:ci
        env:
          NODE_OPTIONS: '--max-old-space-size=12288'
          CI: 'true'

      - name: Copy index → 404 (GitHub Pages SPA)
        run: cp dist/index.html dist/404.html

      - name: Gate — hreflang correctness
        run: npm run audit:hreflang

      - name: Gate — JobPosting schema completeness
        run: npm run validate:jobposting-schema

      - name: Gate — title uniqueness per locale
        run: npm run audit:title-uniqueness

      - name: Gate — duplicate body content
        run: npm run audit:content-duplicates

      - name: Gate — page weight + <img> dims
        run: npm run audit:page-weight

      - name: Upload dist on failure (for forensics)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dist-semrush-gates
          path: dist/
          retention-days: 7
          if-no-files-found: ignore
