name: Translate Pending Jobs

on:
  workflow_run:
    workflows: ["Orchestrate Job Crawlers"]
    types: [completed]
  schedule:
    - cron: '0 6 * * *'     # Daily: housekeeping + translate (replaces cleanup-stale-jobs cron)
    - cron: '0 12 * * *'    # Midday: translate after 08:00 orchestration
    - cron: '0 0 * * *'     # Midnight: translate after 20:00 orchestration
    - cron: '20 0 * * *'    # Nightly retry: after quota reset
    - cron: '20 3 * * *'    # Backup nightly retry
  workflow_dispatch:
    inputs:
      max_jobs:
        description: 'Max jobs to translate'
        default: '100'
      company_key:
        description: 'Single company key to translate (e.g. a-group). Leave empty for all.'
        default: ''
      skip_housekeeping:
        description: 'Skip housekeeping (URL validation, expired pruning)'
        type: boolean
        default: false
      skip_translate:
        description: 'Skip translations (only housekeeping + slug hardening)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (no commit)'
        type: boolean
        default: false

concurrency:
  group: jobs-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 50

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase credentials (optional)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          else
            echo "ℹ️ Firebase secrets not set — will use file config only."
            exit 0
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Load RC secrets
        run: node scripts/load-rc-env.mjs

      # ── Phase 1: Housekeeping (prune expired, validate URLs, dedup) ──────
      # Runs BEFORE translations so we don't waste AI quota on dead jobs.
      # Slug hardening is SKIPPED here — it runs AFTER translations in Phase 3.
      - name: "Phase 1: Housekeeping"
        if: inputs.skip_housekeeping != true
        env:
          JOBS_SKIP_LOCALE_HARDENING: '1'
        run: |
          echo "🧹 Running housekeeping (no slug hardening — deferred to Phase 3)..."
          for slice in data/jobs/by-crawler/*.json; do
            [ -f "$slice" ] || continue
            JOBS_SLICE_FILE="$slice" node scripts/cleanup-jobs.mjs || true
          done
          echo "✅ Housekeeping complete"

      - name: Commit housekeeping
        if: always() && inputs.skip_housekeeping != true && inputs.dry_run != true
        run: bash scripts/lib/git-commit-data.sh --slice-only "🧹 Housekeeping — prune expired + validate URLs"

      # ── Phase 2: Translate pending jobs ──────────────────────────────────
      - name: Assemble dataset
        if: inputs.skip_translate != true
        run: node scripts/assemble-jobs-dataset.mjs

      - name: Log translation stats (before)
        if: inputs.skip_translate != true
        run: node scripts/log-translation-stats.mjs before

      - name: "Phase 2: Translate pending jobs"
        if: inputs.skip_translate != true
        env:
          JOBS_CRAWLER_USE_FIRESTORE_CONFIG: '1'
        run: node scripts/relocalize-pending-jobs.mjs --max-jobs ${{ inputs.max_jobs || '100' }} ${{ inputs.company_key && format('--company-key {0}', inputs.company_key) || '' }}

      - name: Log translation stats (after)
        if: always() && inputs.skip_translate != true
        run: node scripts/log-translation-stats.mjs after

      - name: Scatter changes back to per-crawler slices
        if: inputs.skip_translate != true
        run: node scripts/scatter-jobs-to-slices.mjs

      - name: Commit translations
        if: always() && inputs.skip_translate != true && inputs.dry_run != true
        run: bash scripts/lib/git-commit-data.sh --slice-only "🌐 Auto-translate pending jobs" data/jobs/by-crawler/ data/translation-cache/ data/jobs-crawler-config.json data/slug-registry.json data/translation-stats-history.json

      # ── Phase 3: Harden slugs — DISABLED ──────────────────────────────
      # hardenJobLocaleFields generates slugs from the WRONG title for non-source
      # locales (uses Italian title for DE/FR/EN slug). This causes correct German
      # slugs to be replaced with Italian ones. Disabled until the function is fixed
      # to derive slugs from each locale's own title.
      # TODO: fix hardenJobLocaleFields slug derivation per-locale, then re-enable
      # - name: "Phase 3: Harden slugs"
      #   if: always() && inputs.dry_run != true
      #   run: node scripts/harden-job-slugs.mjs
      # - name: Commit slug hardening
      #   if: always() && inputs.dry_run != true
      #   run: bash scripts/lib/git-commit-data.sh --slice-only "🔗 Harden job slugs (post-translation)"

      # ── Phase 4: Validate + Deploy ──────────────────────────────────────
      - name: Trigger deploy
        if: always() && inputs.dry_run != true
        run: |
          if node scripts/validate-translation-completeness.mjs 2>/dev/null; then
            echo "✅ All translations complete — triggering deploy"
            bash scripts/lib/trigger-deploy.sh
          else
            echo "⏳ Some translations still incomplete — skipping deploy trigger"
            echo "   The next cron run will retry and trigger deploy once all jobs are translated."
          fi

      - name: Report failure to Linear
        if: failure()
        continue-on-error: true
        run: |
          node scripts/lib/linear-issue-creator.mjs \
            --title "Translation Pipeline Failure" \
            --description "## Pipeline fallita

          **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Trigger:** ${{ github.event_name }}" \
            --priority 2 \
            --label Bug \
            --workflow "Translate Pending Jobs"
