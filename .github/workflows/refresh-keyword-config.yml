name: Refresh Keyword Pages Config
on:
  schedule:
    - cron: '30 3 * * 1'  # Every Monday at 03:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Generate keyword pages config
        run: node scripts/generate-keyword-pages-config.mjs

      - name: Re-cluster orphan queries (F3b)
        # Runs off the latest committed gsc-orphan-queries.json (refreshed by
        # sync-gsc-orphans.mjs in its own workflow). Safe to run: produces a
        # deterministic JSON artifact that the build plugin consumes.
        run: node scripts/cluster-orphan-queries.mjs

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/keyword-pages-config.json data/gsc-orphan-queries-clusters.json
          if git diff --cached --quiet; then
            echo "No changes to keyword config"
            exit 0
          fi
          git commit -m "chore: refresh GSC keyword pages config

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"

          # Push with rebase-and-retry to survive concurrent pushes from other
          # workflows. The generator is deterministic given the same GSC data
          # file, so rebasing onto a newer main is always safe: our commit
          # only touches data/keyword-pages-config.json.
          attempt=1
          max_attempts=5
          until git push origin HEAD:main; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Failed to push after $max_attempts attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts); rebasing onto origin/main and retrying..."
            git fetch origin main
            # Rebase our single commit on top of the updated remote main.
            # If rebase fails (e.g. the file was changed upstream in the same
            # window), fall back to regenerating the file on top of the new
            # base so the output reflects the latest state.
            if ! git rebase origin/main; then
              echo "Rebase conflict on data/keyword-pages-config.json; regenerating on top of new base"
              git rebase --abort
              git reset --hard origin/main
              node scripts/generate-keyword-pages-config.mjs
              node scripts/cluster-orphan-queries.mjs
              git add data/keyword-pages-config.json data/gsc-orphan-queries-clusters.json
              if git diff --cached --quiet; then
                echo "No changes after regeneration; nothing to push"
                exit 0
              fi
              git commit -m "chore: refresh GSC keyword pages config

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 2))
          done
