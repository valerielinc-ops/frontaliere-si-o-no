name: Post-deploy Validation

# Reusable workflow called from deploy.yml as the `post-deploy` job.
# Same-run model:
#   • github.sha is invariant — no more workflow_run.head_sha drift
#   • actions/download-artifact@v5 with run-id same-run → no API lag
#   • 1:1 deploy↔validate mapping in the Actions UI by construction;
#     no more "cancelled" post-deploys for cancelled/skipped deploys
#     (the parent gates this entire workflow with `if: success()`)
#   • the parent `build-and-deploy` job has job-level concurrency on
#     `pages-deploy` so the lock is released as soon as deploy finishes,
#     and the next deploy can build while validate runs in parallel
on:
  workflow_call:
    inputs:
      deploy_run_id:
        description: 'Run ID of the calling deploy workflow run (pass github.run_id from the caller).'
        required: true
        type: string
      deploy_event_name:
        description: 'github.event_name from the caller. Used to gate Facebook/LinkedIn posting and live-meta wait to workflow_dispatch deploys (article publishing pipeline).'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for git commit/push in sync-previous-slug-winners
      actions: read     # for download-artifact same-run
    env:
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
    steps:
      - name: Checkout (same SHA as deploy — invariant in workflow_call)
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          else
            echo "⚠️ Firebase secrets not set — registry operations will be skipped."
          fi

      # Hydrate the runner env with secrets pulled from Firebase Remote Config
      # so the social-media post steps below see FB_PAGE_ACCESS_TOKEN /
      # FB_PAGE_ID / LINKEDIN_POST_* etc. as `process.env.*`. Without this
      # step, post-to-facebook.mjs reads `process.env.FB_PAGE_ACCESS_TOKEN`,
      # finds nothing, and silently exits with the "⚠️ FB_PAGE_ACCESS_TOKEN
      # or FB_PAGE_ID not set — skipping Facebook post" log line. The
      # `Post to Facebook Page` and `Post to LinkedIn Company Page` steps
      # appear green in the UI but never publish.
      #
      # load-rc-env.mjs is best-effort: if Firebase credentials are missing
      # or RC fetch fails, it warns and exits 0, leaving env vars unset and
      # downstream posting steps to perform their own "missing token" skip.
      # That is the same fail-soft contract the deploy.yml pipeline already
      # relies on (see deploy.yml step "Load secrets from Remote Config").
      - name: Load secrets from Remote Config (FB + LinkedIn tokens)
        run: node scripts/load-rc-env.mjs

      # Download GitHub Pages artifact + run source validators sequentially.
      #
      # Previously the 4 source validators were launched as `run_bg ... &` in
      # parallel with the artifact download, to save ~30-60s. That race
      # caused `validate:translation-completeness` and
      # `validate:crawler-summaries` (which read `dist/data/jobs.json` and
      # `data/jobs-crawler-summaries.json` from the unpacked artifact) to
      # fail in <1s with "file not found" — the tar -xf hadn't run yet.
      # The whole step exited 1 before the post-build pool could start, the
      # validate job rolled back, and the BFS-depth gate never got tested.
      # Run 25419353305 (sha e9f03ab9) was the last to confirm this race
      # under the previous parallel layout.
      #
      # Sequential layout: download → tar → run each validator one at a time
      # and emit a per-gate ✅/❌ row. Adds ~10-15s wall vs parallel but is
      # deterministic, easier to reason about, and avoids the race entirely.
      # Same-run artifact download. `actions/download-artifact@v5` reads
      # from the current run's artifact storage synchronously — no API
      # propagation lag, no retry, no `gh run download --name` lookup
      # quirks. This is the architectural payoff of unifying deploy +
      # validate in one workflow.
      - name: Download GitHub Pages artifact
        uses: actions/download-artifact@v5
        with:
          name: github-pages
          path: /tmp/github-pages-artifact

      - name: Download pre-deploy sitemap snapshot (optional)
        uses: actions/download-artifact@v5
        continue-on-error: true   # snapshot is optional — IndexNow diff falls back gracefully
        with:
          name: pre-deploy-snapshot-${{ inputs.deploy_run_id }}
          path: /tmp/pre-deploy-snapshot

      - name: Download previous-slug winners (optional)
        uses: actions/download-artifact@v5
        continue-on-error: true   # winners file uploaded only when changed
        with:
          name: winners-${{ inputs.deploy_run_id }}
          path: /tmp/winners

      - name: Extract dist/ + restore data files from artifact
        run: |
          # Pages artifact wraps a single artifact.tar — extract into dist/.
          rm -rf dist && mkdir -p dist
          tar -xf /tmp/github-pages-artifact/artifact.tar -C dist

          # Expose jobs.json to scripts that expect public/data/jobs.json
          # (the file is gitignored; dist/data/jobs.json is the built copy).
          mkdir -p public/data
          cp -f dist/data/jobs.json public/data/jobs.json 2>/dev/null || true
          # validate:crawler-summaries reads data/jobs-crawler-summaries.json,
          # gitignored and produced by `assemble-jobs-dataset.mjs` during
          # build (then copied into dist/data/ by vite). Same pattern.
          cp -f dist/data/jobs-crawler-summaries.json data/jobs-crawler-summaries.json 2>/dev/null || true

          # Optional artifacts — copy if present.
          if [ -f /tmp/pre-deploy-snapshot/pre-deploy-sitemap-urls.json ]; then
            cp /tmp/pre-deploy-snapshot/pre-deploy-sitemap-urls.json /tmp/pre-deploy-sitemap-urls.json
          fi
          if [ -f /tmp/winners/previous-slug-winners.json ]; then
            cp /tmp/winners/previous-slug-winners.json data/previous-slug-winners.json
          fi

      - name: Run source validators sequentially
        run: |
          : > /tmp/source-val-results.txt

          # Run a single validator and append one row to
          # /tmp/source-val-results.txt: "<name>  <wall_s>  rc=<code>".
          # The summary block at the end reads this file to print the
          # per-gate ✅/❌ table.
          run_validator() {
            local name=$1 logfile=$2; shift 2
            local start end rc
            start=$(date +%s.%N)
            set +e
            "$@" > "$logfile" 2>&1
            rc=$?
            set -e
            end=$(date +%s.%N)
            awk -v n="$name" "BEGIN{printf \"%-40s %7.2f rc=%d\n\", n, $end-$start, $rc}" \
              >> /tmp/source-val-results.txt
            if [ "$rc" -ne 0 ]; then
              echo "──── $name failed (rc=$rc) ────"
              cat "$logfile"
              echo "──── end $name ────"
            fi
            return 0   # never let a single fail short-circuit the chain
          }

          # Order: cheap dist-readers first (they fail fast and surface a
          # clean error), then the expensive source-only walk (gate:seo-source
          # ~110s, no dist dependency).
          run_validator validate:translation-completeness /tmp/v10.log \
            node scripts/validate-translation-completeness.mjs
          run_validator validate:crawler-summaries        /tmp/v11.log \
            npm run validate:crawler-summaries
          run_validator validate:third-party-secrets      /tmp/v12.log \
            npm run validate:third-party-secrets
          run_validator gate:seo-source                   /tmp/v27.log \
            npm run gate:seo-source

          # ── 3. Print summary table + decide pass/fail ──
          echo ""
          echo "══════════════════════════════════════════════════════════════"
          echo "Source validators — per-gate results"
          echo "══════════════════════════════════════════════════════════════"
          SRC_PASS=0
          SRC_FAIL=0
          while IFS= read -r line; do
            rc=$(printf '%s' "$line" | grep -oE 'rc=[0-9]+$' | sed 's/rc=//')
            if [ "$rc" = "0" ]; then
              printf "✅ PASS  %s\n" "$line"
              SRC_PASS=$((SRC_PASS + 1))
            else
              printf "❌ FAIL  %s\n" "$line"
              SRC_FAIL=$((SRC_FAIL + 1))
            fi
          done < <(sort -k2 -gr /tmp/source-val-results.txt)
          echo "──────────────────────────────────────────────────────────────"
          echo "Source validators summary: ${SRC_PASS} passed, ${SRC_FAIL} failed"
          echo "══════════════════════════════════════════════════════════════"
          echo ""

          if [ "$SRC_FAIL" -gt 0 ]; then
            echo "::error::${SRC_FAIL} source validator(s) failed — see per-gate output above"
            exit 1
          fi
          echo "✅ Source validators + Pages artifact download complete"

      # Informational diff between the live sitemaps (currently deployed) and
      # the new dist/ that's about to replace them. Helps spot anomalies — a
      # single deploy adding 5 URLs and removing 500 is almost always a bug
      # (e.g. an empty data file passed through the build) but the post-build
      # gates won't always catch it. Always exits 0.
      - name: Sitemap diff vs live deployed site (informational)
        continue-on-error: true
        run: node scripts/diff-sitemaps.mjs

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Validation pool.
      # Runs dist/ HTML walkers plus the post-deploy live smoke in capped
      # parallel. This keeps the critical path close to the slowest dist audit
      # instead of paying an extra tail for CDN propagation + probe + live E2E.
      - name: Post-build validations + SEO audits (capped parallel)
        env:
          # Cap each audit's V8 heap at 4 GB. Without this the GitHub
          # ubuntu-latest free runner (~7 GB usable) was still OOM-killing
          # `audit:dist-multi-light` and `audit:title-uniqueness` at
          # rc=134 even after every heavy walker had been moved into the
          # serial chain. The runner has 7 GB but Node's default
          # max-old-space-size grows opportunistically under pressure;
          # capping it forces aggressive GC and prevents single-process
          # blow-ups when walking ~132k HTML files.
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          # MAX_PARALLEL=1 — fully serialise the pool. After 5 iterations
          # (runs 25400905401, 25402597503, 25404549152, 25406916097,
          # 25408263066) post-deploy still OOM-killed audit:title-uniqueness
          # at rc=134 with chain isolated, dist-multi removed, and
          # NODE_OPTIONS=--max-old-space-size=4096. The 7 GB ubuntu-latest
          # free runner can't reliably host TWO Node processes that each
          # walk 132k HTML files, even with heap cap. With MAX_PARALLEL=1
          # only the chain audit + at most one pool audit run at any
          # moment; two 4 GB-cap Node processes plus OS overhead = ~5-6 GB
          # peak, comfortably under the 7 GB ceiling. Wall-time penalty:
          # pool tail = sum of pool durations ≈ 200 s vs. ~100 s parallel,
          # but reliability wins.
          MAX_PARALLEL=1
          : > /tmp/post-build-timings.txt
          : > /tmp/post-build-failures.txt

          wait_slot() {
            while (( $(jobs -rp | wc -l) >= MAX_PARALLEL )); do
              wait -n 2>/dev/null || true
            done
          }

          # IMPORTANT: `set +e` inside the subshell. The GH Actions default
          # shell is `bash -eo pipefail`, which propagates errexit into the
          # ( ... ) subshell. Without `set +e`, a non-zero rc from "$@" kills
          # the subshell BEFORE rc=$? runs, so neither the timings file nor
          # the failures file gets the row — the failed task vanishes and
          # the parent step prints "✅ All passed". This silently masked
          # the title-length regression in post-deploy run 25377607613.
          spawn_capped() {
            local name=$1; local logfile=$2; shift 2
            wait_slot
            (
              set +e
              start=$(date +%s.%N)
              "$@" > "$logfile" 2>&1
              rc=$?
              end=$(date +%s.%N)
              awk "BEGIN{printf \"%-40s %7.2f rc=%d\n\", \"$name\", $end-$start, $rc}" \
                >> /tmp/post-build-timings.txt
              if [ $rc -ne 0 ]; then
                echo "$name $logfile" >> /tmp/post-build-failures.txt
              fi
            ) &
          }

          # ── HEAVY-DIST-WALKER serialized chain ──
          # Every audit in this chain walks the full dist/ HTML tree
          # (~132k files) and individually peaks 1-3 GB RSS. Running ANY two
          # concurrently on the 7 GB ubuntu-latest free runner risks OOM
          # kill. Post-deploy 25400905401 (chain only had 4 walkers) and
          # 25402597503 (chain + MAX_PARALLEL=2) both SIGABRT'd
          # `audit:dist-multi-light` and `audit:title-uniqueness` because
          # other heavy walkers (text-html-ratio, page-weight,
          # h1-title-duplicates, content-duplicates, etc.) were running
          # concurrently in the spawn_capped pool. Cumulative RSS at peak
          # exceeded the 7 GB cap.
          #
          # Fix: pull EVERY dist-walking audit out of the parallel pool and
          # run them all serially in this single background subshell. OS
          # page cache makes sequential walkers nearly as fast as parallel
          # (dist tree stays hot). The pool keeps only the light audits
          # (sitemap, hreflang, image-object-license, etc.) which read
          # smaller subsets — at MAX_PARALLEL=2 their pool tail is well
          # under the chain's wall time so total step duration is bounded
          # by the chain (~10-12 min).
          (
            set +e
            # NOTE: We DO NOT run `audit:dist-multi` (ratio/heavy/light)
            # aggregators here. Each aggregator runs 3-5 sub-audits in a
            # SINGLE Node process while walking 132k HTML files; that combined
            # working set blows past 4 GB even with NODE_OPTIONS heap cap,
            # consistently OOM-killing dist-multi-light at rc=134
            # (runs 25400905401, 25402597503, 25404549152, 25406916097).
            # Every sub-audit has a standalone equivalent
            # (text-html-ratio, page-weight, h1-title-duplicates,
            # content-duplicates, title-length, title-uniqueness, hreflang)
            # already in this chain or the pool below — running them as
            # separate Node processes lets V8 release memory between audits
            # and avoids the 5-in-1 RSS spike. Wall time is comparable
            # because the OS page cache stays hot across walkers.
            # NOTE: audit:title-uniqueness is moved to a separate weekly
            # workflow. Even with --expose-gc + explicit gc() every 5k
            # files + MAX_PARALLEL=1 + NODE_OPTIONS=--max-old-space-size
            # =4096, it consistently SIGABRTs at rc=134 on the 7 GB
            # ubuntu-latest free runner across 8 consecutive post-deploy
            # iterations. Running it weekly on a runner with more RAM is
            # the right structural answer; gating every deploy on it has
            # blocked the entire pipeline for hours without surfacing
            # actionable regressions. h1-title-duplicates + title-length
            # + title-no-disambig-hash already cover the most important
            # title-quality dimensions per deploy.
            for chain_step in \
              "audit:text-html-ratio|/tmp/g10.log|npm run audit:text-html-ratio" \
              "audit:page-weight|/tmp/g12.log|npm run audit:page-weight" \
              "audit:h1-title-duplicates|/tmp/g11.log|npm run audit:h1-title-duplicates" \
              "audit:title-no-disambig-hash|/tmp/g17b.log|npm run audit:title-no-disambig-hash" \
              "audit:title-length|/tmp/g17.log|npm run audit:title-length" \
              "audit:content-duplicates|/tmp/g8.log|npm run audit:content-duplicates" \
            ; do
              IFS='|' read -r step_name step_log step_cmd <<<"$chain_step"
              start=$(date +%s.%N)
              eval "$step_cmd" > "$step_log" 2>&1
              rc=$?
              end=$(date +%s.%N)
              awk -v n="$step_name" "BEGIN{printf \"%-40s %7.2f rc=%d\n\", n, $end-$start, $rc}" \
                >> /tmp/post-build-timings.txt
              if [ $rc -ne 0 ]; then
                echo "$step_name $step_log" >> /tmp/post-build-failures.txt
              fi
            done
          ) &
          DIST_MULTI_PID=$!

          # LIGHT POOL — only audits that DON'T walk the full dist HTML
          # tree (or walk it cheaply via streaming). Safe to parallelise.
          spawn_capped audit:orphan-sitemap-pages    /tmp/g9.log \
            npm run audit:orphan-sitemap-pages -- --gate=baseline
          spawn_capped validate:sitemap-pages        /tmp/spm.log \
            npm run validate:sitemap-pages
          spawn_capped validate:jobs-quality         /tmp/v2.log \
            npm run validate:jobs-quality
          spawn_capped validate:sitemap-links        /tmp/v3.log \
            npm run validate:sitemap-links
          spawn_capped audit:spa-bundle-injection    /tmp/spa-bundle.log \
            npm run audit:spa-bundle-injection
          spawn_capped audit:hreflang                /tmp/g14.log \
            npm run audit:hreflang
          spawn_capped audit:sitemap-canonicals      /tmp/g15.log \
            npm run audit:sitemap-canonicals
          spawn_capped audit:news-sitemap            /tmp/g16.log \
            npm run audit:news-sitemap
          spawn_capped audit:image-object-license    /tmp/g18.log \
            npm run audit:image-object-license
          spawn_capped audit:max-bfs-depth           /tmp/g19.log \
            npm run audit:max-bfs-depth
          spawn_capped live:post-deploy-smoke        /tmp/live-smoke.log \
            bash -lc 'node scripts/wait-for-pages-propagation.mjs && npm run probe:5xx && LIVE_BASE_URL=https://frontaliereticino.ch npm run test:e2e:live'

          # Wait for the serialized dist-multi chain explicitly, then the
          # rest of the spawn_capped pool. Two `wait` calls (one targeted,
          # one bare) — `wait $PID` returns the chain's rc but we already
          # captured per-variant rc into /tmp/post-build-failures.txt
          # inside the subshell, so the FAIL aggregator below sees them.
          wait "$DIST_MULTI_PID" || true
          wait

          echo ""
          echo "══════════════════════════════════════════════════════════════════════"
          echo "Post-build gates — per-gate results (MAX_PARALLEL=$MAX_PARALLEL, sorted DESC)"
          echo "══════════════════════════════════════════════════════════════════════"
          PB_PASS=0
          PB_FAIL=0
          while IFS= read -r line; do
            rc=$(printf '%s' "$line" | grep -oE 'rc=[0-9]+$' | sed 's/rc=//')
            if [ "$rc" = "0" ]; then
              printf "✅ PASS  %s\n" "$line"
              PB_PASS=$((PB_PASS + 1))
            else
              printf "❌ FAIL  %s\n" "$line"
              PB_FAIL=$((PB_FAIL + 1))
            fi
          done < <(sort -k2 -gr /tmp/post-build-timings.txt)
          echo "──────────────────────────────────────────────────────────────────────"
          echo "Post-build summary: ${PB_PASS} passed, ${PB_FAIL} failed"
          echo "══════════════════════════════════════════════════════════════════════"
          echo ""

          FAIL=0
          if [ -s /tmp/post-build-failures.txt ]; then
            while read -r name logfile; do
              echo "::error::$name failed"
              cat "$logfile"
              FAIL=1
            done < /tmp/post-build-failures.txt
          fi

          [ $FAIL -eq 0 ] || exit 1
          echo "✅ All post-build validators + audits passed"

      # Print the bfs-depth baseline candidate (current dist counts) so the
      # ratchet can be tightened without downloading artifacts. The audit
      # gate above only verifies count <= baseline; it doesn't surface the
      # actual current count when the gate passes. With the JSON dumped here,
      # `npm run audit:max-bfs-depth:rebaseline` becomes a copy-paste from
      # the log into data/bfs-depth-baseline.json — no artifact download,
      # no re-run of the seed workflow. Informational only — never fails.
      - name: Dump bfs-depth baseline candidate (informational)
        if: success()
        continue-on-error: true
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "bfs-depth baseline candidate (current dist counts)"
          echo "══════════════════════════════════════════════════════════════"
          echo "Paste this into data/bfs-depth-baseline.json to ratchet down"
          echo "the gate after a deliberate improvement. Counts must only"
          echo "ever DECREASE — this gate is a ratchet."
          echo "──────────────────────────────────────────────────────────────"
          node scripts/audit-bfs-depth.mjs --max-depth=4 --dist=dist --json || true
          echo "══════════════════════════════════════════════════════════════"

      - name: E2E visual regression (if linux baselines present)
        if: hashFiles('tests/e2e/seo-visual-regression.spec.ts-snapshots/*-linux.png') != ''
        run: npm run test:e2e:visual

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-diffs
          path: test-results/
          retention-days: 14

      - name: Build size summary
        run: |
          echo "=== Recovered dist size summary ==="
          du -sh dist/
          echo "HTML files (top 10 by size):"
          find dist -name "*.html" -exec du -sh {} + | sort -rh | head -10 || true
          echo "Sitemaps:"
          find dist -name "sitemap*.xml" -exec du -sh {} + | sort -rh || true

      - name: Sync previous-slug winners registry
        # The build in deploy.yml may update data/previous-slug-winners.json.
        # The updated file is downloaded from the winners artifact above.
        # If it changed relative to HEAD, commit and push it here.
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet data/previous-slug-winners.json; then
            echo "[previous-slug-winners] no changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/previous-slug-winners.json
          git commit -m "chore(seo): sync previous-slug winners registry"
          git stash push --keep-index --include-untracked -m "validation-build-tree" || true
          bash scripts/lib/git-push-with-retry.sh \
            --in-place-resolver-cmd "node scripts/lib/resolve-winners-conflict.mjs && git add -A"
          git stash pop || true

      - name: Read deploy metadata from Firestore
        id: deploy-meta
        continue-on-error: true
        run: |
          DATA=$(node scripts/deploy-registry.mjs get \
            --run-id="${{ inputs.deploy_run_id }}" 2>/dev/null || echo '{}')
          echo "data=$DATA" >> "$GITHUB_OUTPUT"

      - name: Wait for live article metadata
        if: |
          success() &&
          inputs.deploy_event_name == 'workflow_dispatch' &&
          fromJson(steps.deploy-meta.outputs.data || '{}').articleUrl != null
        id: wait_live_meta
        continue-on-error: true
        env:
          ARTICLE_URL: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleUrl }}
          OG_TITLE: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogTitle }}
          OG_IMAGE: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogImage }}
        run: |
          node scripts/wait-for-live-article-meta.mjs \
            "$ARTICLE_URL" \
            "$OG_TITLE" \
            "$OG_IMAGE"

      - name: Post to Facebook Page
        if: |
          success() &&
          inputs.deploy_event_name == 'workflow_dispatch' &&
          fromJson(steps.deploy-meta.outputs.data || '{}').articleId != null &&
          steps.wait_live_meta.outcome == 'success'
        continue-on-error: true
        env:
          ARTICLE_ID: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleId }}
          ARTICLE_URL: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleUrl }}
          OG_TITLE: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogTitle }}
          OG_DESCRIPTION: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogDescription }}
          ARTICLE_CATEGORY: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleCategory }}
        run: |
          node scripts/post-to-facebook.mjs \
            "$ARTICLE_ID" \
            "$ARTICLE_URL" \
            "$OG_TITLE" \
            "$OG_DESCRIPTION" \
            "$ARTICLE_CATEGORY"

      - name: Post to LinkedIn Company Page
        if: |
          success() &&
          inputs.deploy_event_name == 'workflow_dispatch' &&
          fromJson(steps.deploy-meta.outputs.data || '{}').articleId != null &&
          steps.wait_live_meta.outcome == 'success'
        continue-on-error: true
        env:
          ARTICLE_ID: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleId }}
          ARTICLE_URL: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleUrl }}
          OG_TITLE: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogTitle }}
          OG_DESCRIPTION: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogDescription }}
          ARTICLE_CATEGORY: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleCategory }}
        run: |
          node scripts/post-to-linkedin.mjs \
            "$ARTICLE_ID" \
            "$ARTICLE_URL" \
            "$OG_TITLE" \
            "$OG_DESCRIPTION" \
            "$ARTICLE_CATEGORY"

      - name: Restore indexing API daily tracker
        id: indexing-cache
        uses: actions/cache@v5
        with:
          path: /tmp/indexing-api-submitted-today.json
          key: indexing-api-${{ github.run_id }}
          restore-keys: |
            indexing-api-

      - name: Post-deploy indexing (parallel)
        if: success()
        continue-on-error: true
        timeout-minutes: 5
        env:
          ARTICLE_URL: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleUrl }}
        run: |
          timeout 90 node scripts/submit-google-indexing-jobs.js &
          PID_GOOGLE=$!
          timeout 90 node scripts/submit-indexnow.js &
          PID_INDEXNOW=$!
          timeout 180 node scripts/submit-google-indexing.js &
          PID_GSC=$!
          timeout 90 node scripts/verify-post-deploy-seo.mjs &
          PID_SEO=$!

          FAIL=0
          wait $PID_GOOGLE  || { echo "⚠️ Google Indexing API failed"; FAIL=1; }
          wait $PID_INDEXNOW || { echo "⚠️ IndexNow submission failed"; FAIL=1; }
          wait $PID_GSC     || { echo "⚠️ GSC submission failed"; FAIL=1; }
          wait $PID_SEO     || { echo "⚠️ Post-deploy SEO verification failed"; FAIL=1; }

          if [ $FAIL -ne 0 ]; then
            echo "::warning::Some post-deploy indexing steps failed (non-blocking)"
          fi
          echo "✅ Post-deploy indexing complete"

      - name: Mark deploy as last known good
        if: success()
        run: |
          node scripts/deploy-registry.mjs set-good \
            --run-id="${{ inputs.deploy_run_id }}" \
            --sha="${{ github.sha }}"

      - name: Report failure to Linear
        if: failure()
        continue-on-error: true
        run: |
          node scripts/lib/linear-issue-creator.mjs \
            --title "Validation Failure: post-deploy-validation — run ${{ github.run_number }}" \
            --description "## Validazione post-deploy fallita
          **Deploy run:** https://github.com/${{ github.repository }}/actions/runs/${{ inputs.deploy_run_id }}
          **Validation run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** ${{ github.ref_name }}
          **SHA:** ${{ github.sha }}" \
            --priority 1 \
            --label Bug \
            --workflow "Post-deploy Validation"

  rollback:
    needs: validate
    if: ${{ always() && needs.validate.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.rollback_deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      # Still-live guard. Validate runs in parallel with the next deploy
      # (job-level concurrency on `pages-deploy` releases the lock when
      # build-and-deploy finishes). So when this rollback fires, a NEWER
      # deploy may already be live on GitHub Pages — in which case
      # reverting our own (failed) deploy would clobber a perfectly good
      # one. Check the live Pages deployment's SHA: if it isn't ours,
      # skip rollback and just alert (the next deploy already replaced
      # the bad one).
      - name: Verify our deploy is still live (still-live guard)
        id: still-live
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Get the latest github-pages environment deployment SHA.
          live_sha=$(gh api \
            "repos/${{ github.repository }}/deployments?environment=github-pages&per_page=1" \
            --jq '.[0].sha // empty')
          my_sha="${{ github.sha }}"
          echo "Live Pages deployment SHA: ${live_sha:-(unknown)}"
          echo "My deploy SHA:             $my_sha"
          if [ -z "$live_sha" ]; then
            echo "::warning::Could not resolve live deployment SHA — proceeding with rollback as best-effort"
            echo "still_live=true" >> "$GITHUB_OUTPUT"
          elif [ "$live_sha" = "$my_sha" ]; then
            echo "✅ My deploy is still live — rollback is the right action."
            echo "still_live=true" >> "$GITHUB_OUTPUT"
          else
            echo "ℹ️ A newer deploy ($live_sha) has already replaced mine on Pages."
            echo "   Rollback is a no-op — skipping. The newer deploy already removed the bad version."
            echo "still_live=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get last known good deploy
        if: steps.still-live.outputs.still_live == 'true'
        id: last-good
        run: |
          DATA=$(node scripts/deploy-registry.mjs get-good 2>/dev/null || echo '{}')
          RUN_ID=$(echo "$DATA" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).runId||'')}catch{console.log('')}})")
          SHA=$(echo "$DATA" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).sha||'')}catch{console.log('')}})")
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          if [ -z "$RUN_ID" ]; then
            echo "::warning::No last_known_good found in Firestore — cannot rollback."
          else
            echo "Rolling back to run $RUN_ID (sha $SHA)"
          fi

      - name: Fail if no last known good deploy is available
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id == ''
        run: |
          echo "::error::No last_known_good deploy found in Firestore. Cannot perform rollback."
          exit 1

      - name: Download last known good GitHub Pages artifact
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id != ''
        uses: actions/download-artifact@v5
        with:
          name: github-pages
          path: ./rollback-archive
          run-id: ${{ steps.last-good.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reconstruct rollback site from downloaded Pages artifact
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id != ''
        run: |
          test -f ./rollback-archive/artifact.tar
          mkdir -p ./rollback-dist
          tar -xf ./rollback-archive/artifact.tar -C ./rollback-dist

      - name: Re-upload last known good artifact for Pages
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id != ''
        uses: actions/upload-pages-artifact@v5
        # Note: rollback path — compression-level 9 would be ideal here too
        # but upload-pages-artifact does not expose that parameter. The rollback
        # path is rare enough that the default level-6 zip is acceptable.
        with:
          path: ./rollback-dist

      - name: Deploy last known good to GitHub Pages
        if: steps.still-live.outputs.still_live == 'true' && steps.last-good.outputs.run-id != ''
        id: rollback_deploy
        uses: actions/deploy-pages@v5

      - name: Report rollback to Linear
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ steps.rollback_deploy.outcome }}" = "success" ]; then
            MSG="## Rollback eseguito
          **Rollback a run:** ${{ steps.last-good.outputs.run-id }} (sha ${{ steps.last-good.outputs.sha }})
          **Deploy fallito:** https://github.com/${{ github.repository }}/actions/runs/${{ inputs.deploy_run_id }}
          **Validation run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            MSG="## Rollback fallito
          **Tentato rollback a run:** ${{ steps.last-good.outputs.run-id }} (sha ${{ steps.last-good.outputs.sha }})
          **Deploy fallito:** https://github.com/${{ github.repository }}/actions/runs/${{ inputs.deploy_run_id }}
          **Validation run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          node scripts/lib/linear-issue-creator.mjs \
            --title "Rollback: post-deploy-validation — run ${{ github.run_number }}" \
            --description "$MSG" \
            --priority 1 \
            --label Bug \
            --workflow "Post-deploy Validation Rollback"
