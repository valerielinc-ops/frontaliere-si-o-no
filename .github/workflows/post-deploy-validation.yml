name: Post-deploy Validation

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

concurrency:
  # 1:1 alignment with the deploy workflow — each deploy run gets its own
  # validation that runs to completion. Keying the concurrency group on the
  # triggering deploy's run ID guarantees no two post-deploys ever share a
  # group, so `cancel-in-progress` (still true as a defensive default) only
  # ever fires on a re-run of the same deploy.
  #
  # Previous setting `group: post-deploy-validation` with cancel-in-progress
  # killed validation A mid-flight whenever validation B started (regardless
  # of whether deploy A had already succeeded). For workflow_dispatch flows
  # that publish articles to Facebook/LinkedIn, this dropped posts whenever
  # two articles deployed back-to-back. The new key isolates each run.
  group: post-deploy-validation-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  # Quick pre-check: did the deploy actually succeed and produce a Pages
  # artifact?
  #
  # Mirroring contract — every deploy run produces exactly one
  # post-deploy run with the SAME terminal conclusion:
  #   - deploy success   → post-deploy continues to validate (success on green)
  #   - deploy cancelled → post-deploy cancels itself via `gh run cancel`
  #     so the Actions UI shows "cancelled", not the misleading "skipped"
  #     that a job-level `if` evaluates-false would produce
  #   - deploy failure   → post-deploy fails (exit 1) so the UI shows
  #     "failure", again preserving the deploy's terminal state
  #   - profile-only run → post-deploy succeeds with a no-op (the only
  #     case where mirroring deliberately diverges, because a profile run
  #     never reaches a deployable artifact and there is nothing to validate)
  #
  # Why mirror at all: a 1:1 deploy↔post-deploy alignment makes the
  # Actions UI a faithful audit log. When you see 8 deploy runs and 8
  # post-deploys, each pair shares a status, you can scan the list and
  # immediately tell "every red here matches a red there" instead of
  # decoding "skipped" as either "deploy succeeded but profile run" or
  # "deploy cancelled by concurrency" or "validation gated off".
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.check.outputs.deployable }}
    permissions:
      actions: write   # gh run cancel on this run when deploy was cancelled
    steps:
      - name: Mirror deploy conclusion (cancel/fail to match deploy terminal state)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          echo "Triggering deploy concluded with: $DEPLOY_CONCLUSION"
          case "$DEPLOY_CONCLUSION" in
            success)
              echo "Deploy succeeded — proceeding to artifact check + validation."
              ;;
            cancelled)
              echo "Deploy was cancelled — cancelling this post-deploy run to mirror."
              gh run cancel "${{ github.run_id }}" -R "${{ github.repository }}"
              # `gh run cancel` is async; sleep so the runner sees SIGTERM
              # before the next step starts. exit 1 is a belt-and-suspenders
              # in case cancel doesn't land in time — the run still ends red,
              # which matches the deploy's red better than a green "skipped".
              sleep 30
              exit 1
              ;;
            *)
              # failure / timed_out / action_required / stale / null etc.
              # Fail loud so the UI status mirrors the deploy's failure.
              echo "Deploy did not succeed — failing this post-deploy run to mirror."
              exit 1
              ;;
          esac

      - name: Check for GitHub Pages artifact
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
            --jq "[.artifacts[] | select(.name == \"github-pages\")] | length")
          if [ "${count:-0}" -gt 0 ]; then
            echo "deployable=true" >> "$GITHUB_OUTPUT"
          else
            echo "deployable=false" >> "$GITHUB_OUTPUT"
            echo "No github-pages artifact — profile-only run. Skipping validation."
          fi

  validate:
    needs: pre-check
    if: ${{ needs.pre-check.outputs.deployable == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for git commit/push in sync-previous-slug-winners
      actions: read     # for artifact download from triggering run
    env:
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
    steps:
      # Resolve the deploy's actual head_sha via the gh API instead of trusting
      # `github.event.workflow_run.head_sha`. The event payload value can drift
      # from the deploy's true head_sha when concurrent/cancelled deploys race
      # (observed: post-deploy run 25377607613 had event head_sha=2ee881e while
      # the deploy run 25377550358 was actually built from 4187b27792). The
      # gh API on the deploy run is stable.
      - name: Resolve actual deploy SHA
        id: deploy-sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api_sha=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" \
            --jq .head_sha)
          event_sha="${{ github.event.workflow_run.head_sha }}"
          echo "Deploy run ${{ github.event.workflow_run.id }} → API head_sha: $api_sha"
          if [ "$api_sha" != "$event_sha" ]; then
            echo "::warning::workflow_run.head_sha drift — event=$event_sha api=$api_sha (using API)"
          fi
          echo "sha=$api_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout (same SHA as deploy)
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.deploy-sha.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          else
            echo "⚠️ Firebase secrets not set — registry operations will be skipped."
          fi

      # Hydrate the runner env with secrets pulled from Firebase Remote Config
      # so the social-media post steps below see FB_PAGE_ACCESS_TOKEN /
      # FB_PAGE_ID / LINKEDIN_POST_* etc. as `process.env.*`. Without this
      # step, post-to-facebook.mjs reads `process.env.FB_PAGE_ACCESS_TOKEN`,
      # finds nothing, and silently exits with the "⚠️ FB_PAGE_ACCESS_TOKEN
      # or FB_PAGE_ID not set — skipping Facebook post" log line. The
      # `Post to Facebook Page` and `Post to LinkedIn Company Page` steps
      # appear green in the UI but never publish.
      #
      # load-rc-env.mjs is best-effort: if Firebase credentials are missing
      # or RC fetch fails, it warns and exits 0, leaving env vars unset and
      # downstream posting steps to perform their own "missing token" skip.
      # That is the same fail-soft contract the deploy.yml pipeline already
      # relies on (see deploy.yml step "Load secrets from Remote Config").
      - name: Load secrets from Remote Config (FB + LinkedIn tokens)
        run: node scripts/load-rc-env.mjs

      # Source validators (run on repo source, no dist/ needed) are launched in
      # background while the GitHub Pages artifact downloads in the foreground.
      # Saves 30-60s vs running them sequentially after the download.
      - name: Source validators + download GitHub Pages artifact (parallel)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          : > /tmp/source-val-failures.txt

          run_bg() {
            local name=$1 log=$2; shift 2
            (
              "$@" > "$log" 2>&1
              rc=$?
              if [ $rc -ne 0 ]; then
                echo "$name $log" >> /tmp/source-val-failures.txt
              fi
            ) &
          }

          run_bg validate:translation-completeness /tmp/v10.log \
            node scripts/validate-translation-completeness.mjs
          run_bg validate:crawler-summaries /tmp/v11.log \
            npm run validate:crawler-summaries
          run_bg validate:third-party-secrets /tmp/v12.log \
            npm run validate:third-party-secrets
          run_bg gate:seo-source /tmp/v27.log \
            npm run gate:seo-source

          # Download the exact Pages artifact that was deployed, then expand
          # artifact.tar back into dist/ for the file-based validators.
          rm -rf /tmp/github-pages-artifact dist
          mkdir -p /tmp/github-pages-artifact dist
          gh run download "$DEPLOY_RUN_ID" \
            --name "github-pages" \
            --dir /tmp/github-pages-artifact/
          tar -xf /tmp/github-pages-artifact/artifact.tar -C dist

          # Expose jobs.json to scripts that expect public/data/jobs.json
          # (the file is gitignored; dist/data/jobs.json is the built copy)
          mkdir -p public/data
          cp -f dist/data/jobs.json public/data/jobs.json 2>/dev/null || true

          # Download pre-deploy sitemap snapshot (for IndexNow diff baseline)
          gh run download "$DEPLOY_RUN_ID" \
            --name "pre-deploy-snapshot-${DEPLOY_RUN_ID}" \
            --dir /tmp/pre-deploy-snapshot/ 2>/dev/null || true
          if [ -f /tmp/pre-deploy-snapshot/pre-deploy-sitemap-urls.json ]; then
            cp /tmp/pre-deploy-snapshot/pre-deploy-sitemap-urls.json /tmp/pre-deploy-sitemap-urls.json
          fi

          # Also download the updated previous-slug winners produced by the build.
          gh run download "$DEPLOY_RUN_ID" \
            --name "winners-${DEPLOY_RUN_ID}" \
            --dir /tmp/winners/ || true   # optional — file unchanged if no new slugs

          if [ -f /tmp/winners/previous-slug-winners.json ]; then
            cp /tmp/winners/previous-slug-winners.json data/previous-slug-winners.json
          fi

          wait

          if [ -s /tmp/source-val-failures.txt ]; then
            while read -r name logfile; do
              echo "::error::$name failed"
              cat "$logfile"
            done < /tmp/source-val-failures.txt
            exit 1
          fi
          echo "✅ Source validators + Pages artifact download complete"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Validation pool.
      # Runs dist/ HTML walkers plus the post-deploy live smoke in capped
      # parallel. This keeps the critical path close to the slowest dist audit
      # instead of paying an extra tail for CDN propagation + probe + live E2E.
      - name: Post-build validations + SEO audits (capped parallel)
        run: |
          MAX_PARALLEL=4
          : > /tmp/post-build-timings.txt
          : > /tmp/post-build-failures.txt

          wait_slot() {
            while (( $(jobs -rp | wc -l) >= MAX_PARALLEL )); do
              wait -n 2>/dev/null || true
            done
          }

          # IMPORTANT: `set +e` inside the subshell. The GH Actions default
          # shell is `bash -eo pipefail`, which propagates errexit into the
          # ( ... ) subshell. Without `set +e`, a non-zero rc from "$@" kills
          # the subshell BEFORE rc=$? runs, so neither the timings file nor
          # the failures file gets the row — the failed task vanishes and
          # the parent step prints "✅ All passed". This silently masked
          # the title-length regression in post-deploy run 25377607613.
          spawn_capped() {
            local name=$1; local logfile=$2; shift 2
            wait_slot
            (
              set +e
              start=$(date +%s.%N)
              "$@" > "$logfile" 2>&1
              rc=$?
              end=$(date +%s.%N)
              awk "BEGIN{printf \"%-40s %7.2f rc=%d\n\", \"$name\", $end-$start, $rc}" \
                >> /tmp/post-build-timings.txt
              if [ $rc -ne 0 ]; then
                echo "$name $logfile" >> /tmp/post-build-failures.txt
              fi
            ) &
          }

          # ── audit:dist-multi-* serialized chain ──
          # The 3 dist-multi audits each walk the full dist/ HTML tree
          # (~132k files) and individually peak ~2-3 GB RSS. Running 2-3
          # concurrently on the 7 GB ubuntu-latest free runner triggers
          # the kernel OOM killer (post-deploy run 25393472881 SIGABRT'd
          # `audit:dist-multi-light` and `audit:title-uniqueness` at rc=134).
          #
          # Fix: serialize the 3 dist-multi audits inside a single background
          # subshell so only ONE runs at a time, while the rest of the
          # `spawn_capped` pool keeps running in parallel alongside it.
          # OS page cache helps a lot — sequential dist-multi-* is barely
          # slower than parallel because the dist/ tree is hot after the
          # first walker. Bookkeeping (timings + failures files) mirrors
          # `spawn_capped` so failures are still captured uniformly.
          (
            set +e
            for variant in ratio heavy light; do
              logfile="/tmp/g-dist-multi-${variant}.log"
              start=$(date +%s.%N)
              env AUDIT_DIST_MULTI_GROUP="$variant" npm run audit:dist-multi \
                > "$logfile" 2>&1
              rc=$?
              end=$(date +%s.%N)
              awk "BEGIN{printf \"%-40s %7.2f rc=%d\n\", \"audit:dist-multi-${variant}\", $end-$start, $rc}" \
                >> /tmp/post-build-timings.txt
              if [ $rc -ne 0 ]; then
                echo "audit:dist-multi-${variant} $logfile" >> /tmp/post-build-failures.txt
              fi
            done
          ) &
          DIST_MULTI_PID=$!

          # LPT order: slowest tasks first so the tail is shorter.
          spawn_capped audit:content-duplicates      /tmp/g8.log \
            npm run audit:content-duplicates
          spawn_capped audit:orphan-sitemap-pages    /tmp/g9.log \
            npm run audit:orphan-sitemap-pages -- --gate=baseline
          spawn_capped audit:text-html-ratio         /tmp/g10.log \
            npm run audit:text-html-ratio
          spawn_capped audit:h1-title-duplicates     /tmp/g11.log \
            npm run audit:h1-title-duplicates
          spawn_capped audit:page-weight             /tmp/g12.log \
            npm run audit:page-weight
          spawn_capped audit:title-uniqueness        /tmp/g13.log \
            npm run audit:title-uniqueness
          spawn_capped validate:sitemap-pages        /tmp/spm.log \
            npm run validate:sitemap-pages
          spawn_capped validate:jobs-quality         /tmp/v2.log \
            npm run validate:jobs-quality
          spawn_capped validate:sitemap-links        /tmp/v3.log \
            npm run validate:sitemap-links
          spawn_capped audit:spa-bundle-injection    /tmp/spa-bundle.log \
            npm run audit:spa-bundle-injection
          spawn_capped audit:hreflang                /tmp/g14.log \
            npm run audit:hreflang
          spawn_capped audit:sitemap-canonicals      /tmp/g15.log \
            npm run audit:sitemap-canonicals
          spawn_capped audit:news-sitemap            /tmp/g16.log \
            npm run audit:news-sitemap
          spawn_capped audit:title-length            /tmp/g17.log \
            npm run audit:title-length
          spawn_capped audit:title-no-disambig-hash  /tmp/g17b.log \
            npm run audit:title-no-disambig-hash
          spawn_capped audit:image-object-license    /tmp/g18.log \
            npm run audit:image-object-license
          spawn_capped audit:max-bfs-depth           /tmp/g19.log \
            npm run audit:max-bfs-depth
          spawn_capped live:post-deploy-smoke        /tmp/live-smoke.log \
            bash -lc 'node scripts/wait-for-pages-propagation.mjs && npm run probe:5xx && LIVE_BASE_URL=https://frontaliereticino.ch npm run test:e2e:live'

          # Wait for the serialized dist-multi chain explicitly, then the
          # rest of the spawn_capped pool. Two `wait` calls (one targeted,
          # one bare) — `wait $PID` returns the chain's rc but we already
          # captured per-variant rc into /tmp/post-build-failures.txt
          # inside the subshell, so the FAIL aggregator below sees them.
          wait "$DIST_MULTI_PID" || true
          wait

          echo ""
          echo "── Post-build per-task wall_s (MAX_PARALLEL=$MAX_PARALLEL, sorted DESC) ──"
          sort -k2 -gr /tmp/post-build-timings.txt
          echo "─────────────────────────────────────────────────────────────────────"

          FAIL=0
          if [ -s /tmp/post-build-failures.txt ]; then
            while read -r name logfile; do
              echo "::error::$name failed"
              cat "$logfile"
              FAIL=1
            done < /tmp/post-build-failures.txt
          fi

          [ $FAIL -eq 0 ] || exit 1
          echo "✅ All post-build validators + audits passed"

      - name: E2E visual regression (if linux baselines present)
        if: hashFiles('tests/e2e/seo-visual-regression.spec.ts-snapshots/*-linux.png') != ''
        run: npm run test:e2e:visual

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-diffs
          path: test-results/
          retention-days: 14

      - name: Build size summary
        run: |
          echo "=== Recovered dist size summary ==="
          du -sh dist/
          echo "HTML files (top 10 by size):"
          find dist -name "*.html" -exec du -sh {} + | sort -rh | head -10 || true
          echo "Sitemaps:"
          find dist -name "sitemap*.xml" -exec du -sh {} + | sort -rh || true

      - name: Sync previous-slug winners registry
        # The build in deploy.yml may update data/previous-slug-winners.json.
        # The updated file is downloaded from the winners artifact above.
        # If it changed relative to HEAD, commit and push it here.
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet data/previous-slug-winners.json; then
            echo "[previous-slug-winners] no changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/previous-slug-winners.json
          git commit -m "chore(seo): sync previous-slug winners registry"
          git stash push --keep-index --include-untracked -m "validation-build-tree" || true
          bash scripts/lib/git-push-with-retry.sh \
            --in-place-resolver-cmd "node scripts/lib/resolve-winners-conflict.mjs && git add -A"
          git stash pop || true

      - name: Read deploy metadata from Firestore
        id: deploy-meta
        continue-on-error: true
        run: |
          DATA=$(node scripts/deploy-registry.mjs get \
            --run-id="${{ github.event.workflow_run.id }}" 2>/dev/null || echo '{}')
          echo "data=$DATA" >> "$GITHUB_OUTPUT"

      - name: Wait for live article metadata
        if: |
          success() &&
          github.event.workflow_run.event == 'workflow_dispatch' &&
          fromJson(steps.deploy-meta.outputs.data || '{}').articleUrl != null
        id: wait_live_meta
        continue-on-error: true
        env:
          ARTICLE_URL: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleUrl }}
          OG_TITLE: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogTitle }}
          OG_IMAGE: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogImage }}
        run: |
          node scripts/wait-for-live-article-meta.mjs \
            "$ARTICLE_URL" \
            "$OG_TITLE" \
            "$OG_IMAGE"

      - name: Post to Facebook Page
        if: |
          success() &&
          github.event.workflow_run.event == 'workflow_dispatch' &&
          fromJson(steps.deploy-meta.outputs.data || '{}').articleId != null &&
          steps.wait_live_meta.outcome == 'success'
        continue-on-error: true
        env:
          ARTICLE_ID: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleId }}
          ARTICLE_URL: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleUrl }}
          OG_TITLE: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogTitle }}
          OG_DESCRIPTION: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogDescription }}
          ARTICLE_CATEGORY: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleCategory }}
        run: |
          node scripts/post-to-facebook.mjs \
            "$ARTICLE_ID" \
            "$ARTICLE_URL" \
            "$OG_TITLE" \
            "$OG_DESCRIPTION" \
            "$ARTICLE_CATEGORY"

      - name: Post to LinkedIn Company Page
        if: |
          success() &&
          github.event.workflow_run.event == 'workflow_dispatch' &&
          fromJson(steps.deploy-meta.outputs.data || '{}').articleId != null &&
          steps.wait_live_meta.outcome == 'success'
        continue-on-error: true
        env:
          ARTICLE_ID: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleId }}
          ARTICLE_URL: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleUrl }}
          OG_TITLE: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogTitle }}
          OG_DESCRIPTION: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').ogDescription }}
          ARTICLE_CATEGORY: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleCategory }}
        run: |
          node scripts/post-to-linkedin.mjs \
            "$ARTICLE_ID" \
            "$ARTICLE_URL" \
            "$OG_TITLE" \
            "$OG_DESCRIPTION" \
            "$ARTICLE_CATEGORY"

      - name: Restore indexing API daily tracker
        id: indexing-cache
        uses: actions/cache@v5
        with:
          path: /tmp/indexing-api-submitted-today.json
          key: indexing-api-${{ github.run_id }}
          restore-keys: |
            indexing-api-

      - name: Post-deploy indexing (parallel)
        if: success()
        continue-on-error: true
        timeout-minutes: 5
        env:
          ARTICLE_URL: ${{ fromJson(steps.deploy-meta.outputs.data || '{}').articleUrl }}
        run: |
          timeout 90 node scripts/submit-google-indexing-jobs.js &
          PID_GOOGLE=$!
          timeout 90 node scripts/submit-indexnow.js &
          PID_INDEXNOW=$!
          timeout 180 node scripts/submit-google-indexing.js &
          PID_GSC=$!
          timeout 90 node scripts/verify-post-deploy-seo.mjs &
          PID_SEO=$!

          FAIL=0
          wait $PID_GOOGLE  || { echo "⚠️ Google Indexing API failed"; FAIL=1; }
          wait $PID_INDEXNOW || { echo "⚠️ IndexNow submission failed"; FAIL=1; }
          wait $PID_GSC     || { echo "⚠️ GSC submission failed"; FAIL=1; }
          wait $PID_SEO     || { echo "⚠️ Post-deploy SEO verification failed"; FAIL=1; }

          if [ $FAIL -ne 0 ]; then
            echo "::warning::Some post-deploy indexing steps failed (non-blocking)"
          fi
          echo "✅ Post-deploy indexing complete"

      - name: Mark deploy as last known good
        if: success()
        run: |
          node scripts/deploy-registry.mjs set-good \
            --run-id="${{ github.event.workflow_run.id }}" \
            --sha="${{ github.event.workflow_run.head_sha }}"

      - name: Report failure to Linear
        if: failure()
        continue-on-error: true
        run: |
          node scripts/lib/linear-issue-creator.mjs \
            --title "Validation Failure: post-deploy-validation — run ${{ github.run_number }}" \
            --description "## Validazione post-deploy fallita
          **Deploy run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
          **Validation run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** ${{ github.event.workflow_run.head_branch }}
          **SHA:** ${{ github.event.workflow_run.head_sha }}" \
            --priority 1 \
            --label Bug \
            --workflow "Post-deploy Validation"

  rollback:
    needs: validate
    if: ${{ always() && needs.validate.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.rollback_deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      - name: Get last known good deploy
        id: last-good
        run: |
          DATA=$(node scripts/deploy-registry.mjs get-good 2>/dev/null || echo '{}')
          RUN_ID=$(echo "$DATA" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).runId||'')}catch{console.log('')}})")
          SHA=$(echo "$DATA" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).sha||'')}catch{console.log('')}})")
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          if [ -z "$RUN_ID" ]; then
            echo "::warning::No last_known_good found in Firestore — cannot rollback."
          else
            echo "Rolling back to run $RUN_ID (sha $SHA)"
          fi

      - name: Fail if no last known good deploy is available
        if: steps.last-good.outputs.run-id == ''
        run: |
          echo "::error::No last_known_good deploy found in Firestore. Cannot perform rollback."
          exit 1

      - name: Download last known good GitHub Pages artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download "${{ steps.last-good.outputs.run-id }}" \
            --name github-pages \
            --dir ./rollback-archive/

      - name: Reconstruct rollback site from downloaded Pages artifact
        run: |
          test -f ./rollback-archive/artifact.tar
          mkdir -p ./rollback-dist
          tar -xf ./rollback-archive/artifact.tar -C ./rollback-dist

      - name: Re-upload last known good artifact for Pages
        uses: actions/upload-pages-artifact@v5
        # Note: rollback path — compression-level 9 would be ideal here too
        # but upload-pages-artifact does not expose that parameter. The rollback
        # path is rare enough that the default level-6 zip is acceptable.
        with:
          path: ./rollback-dist

      - name: Deploy last known good to GitHub Pages
        id: rollback_deploy
        uses: actions/deploy-pages@v5

      - name: Report rollback to Linear
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ steps.rollback_deploy.outcome }}" = "success" ]; then
            MSG="## Rollback eseguito
          **Rollback a run:** ${{ steps.last-good.outputs.run-id }} (sha ${{ steps.last-good.outputs.sha }})
          **Deploy fallito:** https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
          **Validation run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            MSG="## Rollback fallito
          **Tentato rollback a run:** ${{ steps.last-good.outputs.run-id }} (sha ${{ steps.last-good.outputs.sha }})
          **Deploy fallito:** https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
          **Validation run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          node scripts/lib/linear-issue-creator.mjs \
            --title "Rollback: post-deploy-validation — run ${{ github.run_number }}" \
            --description "$MSG" \
            --priority 1 \
            --label Bug \
            --workflow "Post-deploy Validation Rollback"
