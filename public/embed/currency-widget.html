<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,follow">
<title>Cambio CHF/EUR · Frontaliere Ticino widget</title>
<!--
  Frontaliere Ticino — embeddable currency widget (Sprint 5.3).

  Purpose
  -------
  External sites (bloggers, commercialisti, union pages, expat forums) can
  <iframe> this file to show a lightweight, always-fresh CHF/EUR and net-pay
  teaser without pulling the full SPA. Every embed carries a visible
  attribution link back to frontaliereticino.ch (rel="noopener", NOT
  nofollow — the editorial link is the point).

  Data source
  -----------
  Reads /embed/widget-data.json at load time. That file is a static snapshot
  of the latest exchange rate + top headline stats, refreshed by the build
  (fallback values baked in below make the widget work even when the JSON
  fetch fails — e.g. when the file has not yet been deployed). No runtime
  API keys, no Firebase Remote Config, no auth.

  Embed snippet (copy-paste for external sites):
  ----------------------------------------------
    <iframe
      src="https://frontaliereticino.ch/embed/currency-widget.html"
      title="Cambio CHF/EUR · Frontaliere Ticino"
      width="100%"
      height="280"
      loading="lazy"
      style="border:0;max-width:480px"
    ></iframe>
-->
<style>
  :root{color-scheme:light dark}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#ffffff;color:#0f172a;padding:0;line-height:1.45}
  @media (prefers-color-scheme:dark){body{background:#0f172a;color:#e2e8f0}}
  .card{max-width:480px;margin:0;padding:18px 20px;border:1px solid rgba(148,163,184,.35);border-radius:12px;background:rgba(248,250,252,.55)}
  @media (prefers-color-scheme:dark){.card{background:rgba(30,41,59,.4);border-color:rgba(148,163,184,.25)}}
  .brand{display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b;margin:0 0 10px}
  .brand b{color:#0f172a}
  @media (prefers-color-scheme:dark){.brand b{color:#e2e8f0}}
  .rate{display:flex;align-items:baseline;gap:10px;margin:4px 0 8px}
  .rate .big{font-size:34px;font-weight:800;letter-spacing:-.02em}
  .rate .label{font-size:13px;color:#64748b}
  .sub{font-size:13px;color:#475569;margin:0 0 12px}
  @media (prefers-color-scheme:dark){.sub{color:#94a3b8}}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:0 0 14px}
  .stat{padding:10px 12px;border-radius:10px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.15)}
  .stat .k{font-size:11px;color:#6366f1;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-size:16px;font-weight:700;color:#0f172a;margin-top:2px}
  @media (prefers-color-scheme:dark){.stat .v{color:#e2e8f0}}
  .cta{display:inline-block;margin-top:2px;padding:9px 14px;border-radius:10px;background:#4f46e5;color:#fff;text-decoration:none;font-size:13px;font-weight:700}
  .cta:hover{background:#4338ca}
  .src{font-size:11px;color:#94a3b8;margin:10px 0 0}
  .src a{color:inherit;text-decoration:underline}
</style>
</head>
<body>
<main class="card" aria-labelledby="widgetTitle">
  <p class="brand"><b>Frontaliere Ticino</b> · <span id="widgetTitle">cambio CHF/EUR</span></p>
  <div class="rate">
    <span class="big" id="chfEur">0,9500</span>
    <span class="label">CHF/EUR</span>
  </div>
  <p class="sub" id="asOf">fallback snapshot</p>
  <section class="stats" aria-label="Dati rapidi frontalieri">
    <div class="stat">
      <div class="k">stipendio mediano</div>
      <div class="v" id="medianChf">CHF 73 000</div>
    </div>
    <div class="stat">
      <div class="k">aliquota fonte (nuovi)</div>
      <div class="v">20 %</div>
    </div>
  </section>
  <a class="cta"
     href="https://frontaliereticino.ch/?utm_source=embed&amp;utm_medium=widget&amp;utm_campaign=currency"
     target="_top"
     rel="noopener">
    Calcola il tuo netto frontaliere &rsaquo;
  </a>
  <p class="src">
    Fonte:
    <a href="https://frontaliereticino.ch/?utm_source=embed&amp;utm_medium=widget&amp;utm_campaign=currency"
       target="_top"
       rel="noopener">frontaliereticino.ch</a>
  </p>
</main>
<script>
  // Fetch the live snapshot; fall back silently to the baked-in values if the
  // file is missing, the site is offline, or the request is blocked.
  (function () {
    try {
      fetch('/embed/widget-data.json', { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          if (!data) return;
          if (data.chfEur) {
            var el = document.getElementById('chfEur');
            if (el) el.textContent = String(data.chfEur).replace('.', ',');
          }
          if (data.asOf) {
            var a = document.getElementById('asOf');
            if (a) a.textContent = 'aggiornato al ' + data.asOf;
          }
          if (data.medianChf) {
            var m = document.getElementById('medianChf');
            if (m) m.textContent = 'CHF ' + String(data.medianChf).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
          }
        })
        .catch(function () {});
    } catch (e) {}
  })();
</script>
</body>
</html>
